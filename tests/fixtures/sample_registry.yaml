product: "Rooben Pro"
version: "0.1.0"
capabilities:
  - id: "CAP-LEARN-SEARCH"
    name: "Semantic Knowledge Search"
    description: "Search learnings by semantic similarity"
    status: "complete"
    api_endpoint: "GET /api/learnings/search"
    ui_page: "/pro/learnings"
    feature_area: "Learning System"

  - id: "CAP-LEARN-CREATE"
    name: "Manual Learning Creation"
    description: "Create learnings with keywords and content"
    status: "complete"
    api_endpoint: "POST /api/org/learnings/"
    ui_page: "/pro/learnings"
    feature_area: "Learning System"

  - id: "CAP-LEARN-CONTRA"
    name: "Contradiction Detection"
    description: "Detect conflicting learnings via cosine similarity"
    status: "complete"
    feature_area: "Learning System"

  - id: "CAP-LEARN-SIDEBAR"
    name: "Learning Sidebar Auto-Surface"
    description: "Automatically surface relevant learnings during workspace sessions"
    status: "complete"
    ui_page: "/pro/workspace"
    feature_area: "Learning System"

  - id: "CAP-ROUTE-FIND"
    name: "Capability-Based Agent Routing"
    description: "Find best agent for a task via semantic matching"
    status: "complete"
    api_endpoint: "POST /api/org/agents/route"
    ui_page: "/pro/route"
    feature_area: "Routing"

  - id: "CAP-DELEG-CREATE"
    name: "Delegation Creation"
    description: "Create task delegations with lifecycle tracking"
    status: "complete"
    api_endpoint: "POST /api/org/agents/{id}/delegate"
    ui_page: "/pro/delegations"
    feature_area: "Delegation"

  - id: "CAP-DASH-ORG"
    name: "Organization Dashboard"
    description: "Org-level ROI metrics, delegation graph, cost breakdown"
    status: "complete"
    api_endpoint: "GET /api/org/dashboard/*"
    ui_page: "/pro/org-dashboard"
    feature_area: "Analytics"

  - id: "CAP-SKILL-EXTRACT"
    name: "Skill Extraction"
    description: "Auto-extract reusable skills from workflows"
    status: "complete"
    api_endpoint: "POST /api/skills/"
    feature_area: "Skills System"

  - id: "CAP-MARKET-BROWSE"
    name: "Marketplace Browse"
    description: "Browse and install community agents and templates"
    status: "complete"
    api_endpoint: "GET /api/marketplace/"
    feature_area: "Marketplace"

  - id: "CAP-IMPORT-BULK"
    name: "Bulk Knowledge Import"
    description: "Import learnings from CSV/JSON files"
    status: "future"
    feature_area: "Learning System"

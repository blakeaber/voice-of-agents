unmet_need: 'The outcome being organized against is "silent partial correctness" —
  a pipeline that runs green,

  produces beautiful output, is wrong in ways the reviewer won''t catch, and is cosigned
  by another

  probabilistic agent that launders the error as verified. Downstream consequences:
  a PM builds a

  roadmap on a fabricated quote, a member gets denied on a hallucinated policy citation,
  a customer

  receives a vendor questionnaire misrepresenting security posture, a PII column ships
  to staging

  mapped wrong. The persona would rather have a loud crash than a plausible lie. Vendors
  who

  respond to a correctness bug with "try a better prompt" are disqualified permanently.


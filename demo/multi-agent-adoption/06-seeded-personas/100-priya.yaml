ai_history: 'Awareness typically arrives via technical channels (Latent Space podcast,
  Hacker News, peer

  forwards). The persona spins up a sandbox or solo trial within days, refuses sales-gated
  demos,

  and builds a real pilot DAG within the first week against synthetic or low-risk
  data. The

  inflection point — in either direction — always arrives at a specific coordination
  failure

  between agents (a dropped field, a hallucinated citation, a stale doc, a cosigned
  lie). Adopters

  keep paying only when they can inspect the exact token where context was lost and
  bolt on a

  schema contract themselves; abandoners and rejectors walk the moment a plausible-but-wrong
  output

  passes a peer agent''s check. Partial adopters freeze scope at the first such incident
  rather

  than expand. [source: evidence/subject-01.md Q1] [source: evidence/subject-05.md
  Q1]

  [source: evidence/subject-12.md Q1]

  '
mindset: 'Hire a multi-agent workflow tool to automate multi-step research, synthesis,
  and drafting pipelines

  (escalation triage, voice-of-customer briefs, claims extraction, SOC2 evidence,
  vendor questionnaires)

  that currently burn 6-10 hours/week of senior engineering or PM time — without introducing
  silent

  data corruption or shifting verification cost back onto the human reviewer. The
  job is eliminating

  context-gathering toil, not eliminating judgment; every inter-agent handoff must
  be auditable and

  every probabilistic step must be gated by deterministic verification before it causes
  side effects.

  [source: evidence/subject-01.md Q5] [source: evidence/subject-10.md Q2] [source:
  evidence/subject-12.md Q5]

  '
pain_points:
- description: 'Mid-market to regulated-enterprise context. Discretionary budget typically
    $500/mo solo,

    higher amounts route through VP/procurement. SOC2 Type II is table stakes; HIPAA/PCI/BAA/self-

    hosted-VPC required in regulated segments. Team is small (4-6 engineers) with
    no dedicated

    ML/AI ops headcount, so tools cannot require a full-time maintainer. Time budget
    for tooling

    experiments is ~20% of one engineer''s week. Hard floor: inter-agent handoffs
    must be logged,

    replayable, and auditable; no probabilistic step can be terminal — deterministic
    code must own

    the go/no-go before any side effect. [source: evidence/subject-01.md Q2]

    [source: evidence/subject-07.md Q3] [source: evidence/subject-10.md Q2] [source:
    evidence/subject-12.md Q3]

    '

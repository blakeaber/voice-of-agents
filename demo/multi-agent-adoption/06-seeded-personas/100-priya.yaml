- description: 'Abandons (or freezes scope) the moment coordination between agents
    produces a confident,

    well-formatted output that is subtly wrong in a way only surfaced by manual re-verification.

    The trigger is not breakage — it''s a plausible-wrong output that another stochastic
    step

    cosigned. Refine/prompt-tweak loops actively make it worse because they accumulate
    untestable

    technical debt and signal that the vendor treats correctness as a prompt-engineering
    problem.

    The verification tax erases the automation ROI: "I haven''t automated anything,
    I''ve just added

    a verification step to my job." [source: evidence/subject-01.md Q5] [source: evidence/subject-05.md
    Q3]

    [source: evidence/subject-10.md Q5]

    '
  impact: Leads to abandonment — high severity

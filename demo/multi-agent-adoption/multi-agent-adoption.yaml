  subjects:
  - subject_id: subject-01
    adoption_status: adopter
    context_segment: B2B-mid
    jtbd: 'Maya Chen, Staff Platform Engineer at a ~350-person B2B SaaS company (mid-market
      HR analytics, Series C), is hiring a multi-agent workflow tool to automate the
      "customer escalation triage + RCA draft" pipeline that currently eats ~6 hours/week
      of her senior engineers'' time. Specifically: ingest a Zendesk escalation, pull
      related Datadog traces, cross-reference the last 14 days of deploys in GitHub,
      draft a root-cause hypothesis, and post a structured summary to the incident
      Slack channel. She''s not trying to replace judgment — she''s trying to eliminate
      the 40 minutes of context-gathering that happens before a human can even start
      thinking.

      '
    adoption_trajectory: 'Awareness came from a Latent Space podcast episode in August.
      She spent a weekend evaluating LangGraph (too much glue code for her team to
      maintain), CrewAI (flaky on anything beyond demos), and n8n with AI nodes (fine
      for linear flows but fell apart on branching logic). Tried Rooben Pro after
      a colleague at another startup showed her a DAG they''d built. Inflection point
      was week 2: she had a pipeline that had failed 4 times in a row on a handoff
      between the "trace summarizer" agent and the "deploy correlator" agent — the
      trace summarizer was dropping the service name in its output. She opened the
      step-level log, saw the exact token where context was lost, used the conversational
      refine to add an explicit schema constraint to the handoff, and it worked. That
      was the moment she decided to keep paying.

      '
    last_concrete_episode: 'Tuesday of last week, 10:47am. A P2 escalation came in
      from a mid-market customer about dashboard latency. Normally her on-call would
      spend ~35 minutes gathering context. The Rooben pipeline ran in 4 minutes and
      posted to Slack. But — and this is the important part — the RCA draft confidently
      named the wrong deploy as the culprit. It cited a frontend deploy from the previous
      day when the actual cause was a database migration from 3 days earlier. The
      trace-correlator agent had handed off a truncated deploy list to the hypothesis
      agent. She caught it because she happened to glance at the raw trace timestamps
      and they didn''t match. She spent 20 minutes in the DAG inspector, found that
      the deploy-correlator was capping results at 10 items without surfacing that
      truncation downstream. She used the refine flow to add a "truncation warning"
      field to the handoff schema. Shipped the fix same afternoon.

      '
    constraint_profile: 'Budget approval up to $500/mo discretionary, above that needs
      her VP Eng. Team of 4 platform engineers supporting ~40 product engineers. SOC2
      Type II — any tool touching customer data needs a DPA and can''t train on their
      data. Time is the hardest constraint: she can spend maybe 3 hours a week on
      tooling experiments before it shows up in her sprint velocity. Can''t tolerate
      tools that require a dedicated maintainer.

      '
    failure_or_abandonment_mode: ''
    decision_topology: 'Bottom-up trial: she pilots solo or with one other engineer
      for 2-3 weeks, then if it sticks she brings it to the platform team standup.
      Budget goes through her VP but only after she''s already proven it. No procurement
      committee at this size. She explicitly avoids tools that require a sales call
      before trial — she killed an evaluation of a competitor because "they wouldn''t
      let me touch it without a 30-minute demo."

      '
    anti_model_of_success: 'A black-box agent tool that produces plausible-sounding
      outputs she can''t verify without redoing the work. She''s seen this with a
      GPT-4 wrapper her team tried in Q1 — it would generate RCA drafts that were
      coherent and wrong, and her senior engineer started double-checking every output,
      which cost more time than doing it manually. "Confidently wrong" is the specific
      failure mode she''s organizing her whole toolchain against.

      '
    verbatim_quote_bank:
    - key: Q1
      text: When the trace summarizer dropped the service name for the fourth time
        in a row, I was about thirty seconds from just deleting the workspace and
        going back to a bash script. I'd already opened the billing page.
    - key: Q2
      text: I basically built a schema contract between agents by hand — I made every
        handoff emit JSON with required fields, and if a field was missing I made
        the downstream agent refuse the input instead of hallucinating around it.
        That's the thing that made it stop lying to me.
    - key: Q3
      text: What's missing is — when an agent truncates something, or hits a token
        limit, or falls back to a smaller model, I want that surfaced as a first-class
        signal downstream. Not buried in a log. The next agent needs to know 'your
        input is incomplete' the same way it knows what the input is.
    - key: Q4
      text: My first reaction was, okay, this is another one. Another tool that demos
        great and falls over the second you point it at something real. I literally
        said out loud 'of course it did.'
    - key: Q5
      text: The worst outcome isn't that it fails. The worst outcome is that it gives
        me an answer that's seventy percent right and I have to audit it to find the
        thirty percent that's wrong. At that point I haven't automated anything, I've
        just added a verification step to my job.
  - subject_id: subject-02
    adoption_status: adopter
    context_segment: B2C-high-autonomy
    jtbd: 'Maya Oduya, 34, solo indie hacker running a one-person content business
      (a niche newsletter + paid Substack on sustainable home goods, ~4,200 paid subscribers).
      She''s hiring a multi-agent workflow tool to do end-to-end weekly content production:
      scrape product release feeds, cross-reference sustainability certifications,
      draft comparison posts, generate social variants, and schedule them. Previously
      she did this with a chain of Zapier + ChatGPT + Notion + manual QA. She wants
      to hire Rooben Pro to replace the 8-10 hours/week of orchestration glue work
      so she can focus on original reporting and sponsor calls. 7 years as a freelance
      dev before going solo on the newsletter in 2023; comfortable with Python, writes
      her own scrapers, but doesn''t want to maintain infra.

      '
    adoption_trajectory: 'Awareness: Saw Rooben Pro in a Latent Space podcast ad in
      August 2025, then a thread from someone she follows showing a DAG for podcast-to-blog
      repurposing. Trial: Signed up for the free tier mid-September, spent a Saturday
      rebuilding her "weekly sustainability roundup" pipeline. Adoption inflection:
      Day 4, she got a run where the research agent correctly flagged a greenwashing
      claim that her old Zapier+GPT chain had missed three times — that was the "ok
      this is different" moment. Upgraded to Pro ($49/mo) on day 11 after the second
      successful weekly cycle. Still using it as of now, ~6 weeks in, but with specific
      guardrails she''s added.

      '
    last_concrete_episode: 'Last Tuesday (4 days ago). She kicked off her weekly roundup
      workflow at 6am — 7 agents: feed scraper → dedup → cert-check → draft writer
      → fact-checker → social splitter → scheduler. Around step 4, the draft writer
      agent produced copy citing a B-Corp certification for a brand that the cert-check
      agent had actually flagged as expired two steps earlier. The handoff carried
      the product info but dropped the cert status field. She caught it because she
      always reads the draft before it goes to the scheduler — if she hadn''t, it
      would have published a factually wrong claim to 4,200 people. She opened the
      DAG view, clicked into the handoff between cert-check and draft-writer, saw
      the schema mismatch (cert-check output had a nested `flags` object the draft
      writer''s prompt didn''t reference). She used the conversational refine to say
      "the draft agent is ignoring expired cert flags — make it a hard stop." Rooben
      rewrote the draft agent''s input contract. Re-ran. Worked. But she spent 40
      minutes on it and her trust took a real hit.

      '
    constraint_profile: 'Time: solo operator, every hour on plumbing is an hour not
      writing. Budget: under $200/mo total for tooling is her self-imposed cap; $49
      for Rooben is already her second-biggest SaaS line after Substack fees. Approval:
      none, decides alone same-day. Compliance: none formal, but reputational — publishing
      a wrong sustainability claim would tank her credibility with the audience she''s
      built for 2.5 years. Tooling: already on Zapier, Notion, Substack API, Supabase;
      doesn''t want a third orchestrator. Team size: 1.

      '
    failure_or_abandonment_mode: ''
    decision_topology: 'Solo, bottom-up, trial-driven. Finds tools via podcasts/Twitter,
      tries on a weekend, decides within 2 weeks based on whether it saved her time
      on the next real workload. No budget cycle — it''s her personal card. Will churn
      fast and without ceremony if it burns her twice on production content.

      '
    anti_model_of_success: 'A tool that "works" in the demo but where she can never
      fully trust the output, so she ends up reading every line anyway — which means
      she''s still doing the work, just with an extra $49/mo subscription and the
      illusion of automation. Also: a tool where debugging a failure means reading
      through opaque agent logs for an hour to find out one prompt dropped a field.

      '
    verbatim_quote_bank:
    - key: Q1
      text: When I saw the draft was about to tell 4,000 people a brand was B-Corp
        certified when it wasn't — I genuinely sat there for a minute thinking, am
        I going to have to rip this out and go back to my ugly Zapier chain? Because
        at least with Zapier I knew exactly which step was lying to me.
    - key: Q2
      text: 'So now I have this dumb little rule: any agent that touches a factual
        claim has to output the claim AND the evidence in the same blob, and the next
        agent has to echo both back. I basically forced them to hold hands. It''s
        not elegant but it stopped the silent drops.'
    - key: Q3
      text: What's missing is — I need the handoff itself to be a first-class thing
        I can assert on. Like, 'this field must be present and non-null going into
        the next agent or halt.' Right now it's vibes between prompts.
    - key: Q4
      text: My first reaction was honestly, 'oh, this is the exact failure mode I
        was paying to get away from.' Because a wrong LLM output I expect. A wrong
        LLM output that happens because the previous agent's good answer got thrown
        on the floor? That's a you problem, Rooben.
    - key: Q5
      text: The nightmare is I'm reading every single output anyway. That's not automation,
        that's a very expensive copy editor that also sometimes lies to me.
  - subject_id: subject-03
    adoption_status: partial-adopter
    context_segment: B2B-small
    jtbd: 'Maya Chen, technical co-founder and lead engineer at a 4-person B2B SaaS
      startup (customer feedback analytics for mid-market SaaS companies). She''s
      hiring multi-agent workflow tools to automate the repetitive engineering-adjacent
      work that''s eating her week: triaging inbound customer feedback from 3 channels
      (Intercom, email, a Slack connect channel), drafting PR descriptions from commits,
      and generating weekly customer-health summaries for her co-founder. She wants
      to reclaim ~8 hours/week of "shallow but context-heavy" work without hiring
      a fifth person yet. She''s not trying to replace her engineering judgment —
      she''s trying to get reliable drafts she can edit in 5 minutes instead of building
      from scratch in 45.

      '
    adoption_trajectory: 'Heard about Rooben Pro via a Latent Space podcast ad and
      a thread on Hacker News in late Q1 2025. Signed up same weekend, built a feedback-triage
      workflow in ~2 hours using the visual DAG. First two runs worked, third run
      silently dropped the sentiment-tagging step because one agent returned malformed
      JSON and the downstream agent just... kept going with empty input. She didn''t
      abandon — she kept the PR-description workflow (which is simpler, 2 agents)
      and uses it 3-4x/week. But she stopped using the feedback-triage pipeline after
      the second silent failure in week 2 and now runs that manually with a single
      Claude prompt. Inflection point: the second silent failure on day 11, when she
      sent her co-founder a customer summary that was missing the two most urgent
      tickets. "Partial-adopter" is exactly right — one workflow stuck, the more valuable
      one didn''t.

      '
    last_concrete_episode: 'Last Tuesday (about 6 days ago). She needed to ship a
      PR for a webhook retry fix. Used her Rooben Pro "PR-drafter" workflow: agent
      1 reads the git diff + recent commits, agent 2 drafts the PR description in
      their team''s template, agent 3 suggests reviewers based on CODEOWNERS. Worked
      on first run. She edited maybe 3 lines, shipped in 4 minutes. She said this
      is the pattern that keeps her coming back — 2-3 agent hop, well-scoped, easy
      to eyeball the output.


      Contrast with two weeks ago: she tried to rebuild the feedback-triage workflow
      using Rooben''s conversational refine flow after her first abandonment. She
      described the problem ("sentiment tag kept getting dropped when Intercom returned
      emoji-heavy messages"), the refine flow suggested adding a JSON-validator agent
      between steps. She tried it. It worked on the 3 test messages she pasted in.
      Next morning on real data, a different agent (the deduper) failed the same way
      — returned a string instead of an array, downstream agent produced a summary
      of 1 ticket instead of 40. She didn''t rebuild again. Opened Cursor and wrote
      a 60-line Python script with a single Claude API call that does the whole triage
      in one shot. That script is still what she uses.

      '
    constraint_profile: 'Time: extreme — 4-person team, she''s the only backend engineer.
      Can''t spend a Saturday debugging an orchestration tool. Budget: Rooben Pro
      at $40/mo is trivial, not a factor. Approval: solo decision, no committee. Tooling:
      heavy Cursor + Claude API user, comfortable writing her own scripts, which is
      both an asset and a threat to tools like Rooben (her BATNA is "I''ll just write
      it"). Team size: co-founder is non-technical, uses the outputs but can''t debug
      them, which raises the cost of silent failures dramatically. Compliance: none
      meaningful yet, pre-SOC2.

      '
    failure_or_abandonment_mode: 'Partial abandonment of the highest-value workflow
      (feedback triage) happened on day 11 after two silent coordination failures
      where one agent''s malformed output was accepted by the next agent without validation,
      producing plausible-looking but incomplete summaries. The specific moment: her
      co-founder Slacked her "did we really only get 3 tickets this week?" and she
      checked — there were 41. The failure wasn''t a crash, it was a confident wrong
      answer. She kept the simpler PR-drafter workflow because the output is self-evidently
      wrong when it''s wrong (you read the PR description, you can tell). The triage
      output looked fine until you compared it to source-of-truth. Verification cost
      exceeded automation benefit.

      '
    decision_topology: 'Solo, bottom-up, trial-driven. No procurement. Evaluates by
      building a real workflow on a weekend and seeing if it survives contact with
      Monday. Abandons silently — doesn''t churn formally, just stops opening the
      tab. Willing to keep paying $40/mo for the one workflow that works because switching
      cost to cancel is higher than the fee.

      '
    anti_model_of_success: 'A tool that looks like it''s working but is quietly wrong.
      She used the phrase "confidently incomplete." She''d rather have a loud error
      and do the work herself than get a clean-looking summary that''s missing the
      two tickets that matter. The anti-model is exactly what happened: a dashboard
      of green checkmarks next to a pipeline that dropped 38 of 41 inputs.

      '
    verbatim_quote_bank:
    - key: Q1
      text: When my co-founder asked if we really only had 3 tickets that week and
        I realized we'd had 41 — that's when I closed the tab and didn't open it for
        a week. I wasn't mad, I was embarrassed.
    - key: Q2
      text: I just wrote a 60-line Python script. One Claude call, no agents, no DAG.
        It's uglier but I can read the whole thing in 30 seconds and I know exactly
        where it'll break.
    - key: Q3
      text: There's no — like — nothing stops the pipeline when an agent hands off
        garbage. The next agent just eats the garbage and keeps smiling. I need something
        that screams when a handoff is malformed, not something that produces a prettier
        summary of nothing.
    - key: Q4
      text: The first time I saw the sentiment step got skipped I thought I'd misconfigured
        it. The second time, same failure mode, different agent — that's when I realized
        the tool isn't broken, the whole coordination model is just, like, trust-falling
        between agents with no spotter.
    - key: Q5
      text: Confidently incomplete. That's the worst possible output. I'd rather it
        crash.

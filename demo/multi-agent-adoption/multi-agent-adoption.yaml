    - key: Q4
      text: The second I saw four agents on the canvas my first thought was, great,
        now I have four things that can hallucinate at each other.
    - key: Q5
      text: The thing I'm scared of is the CS team acting on a summary that sounds
        right and is wrong, and me spending Tuesday reverse-engineering a chat log
        to explain it.
  - subject_id: subject-10
    adoption_status: actively-anti
    context_segment: B2B-mid
    jtbd: 'Ship reliable internal automation for a 40-person B2B SaaS (customer data
      platform) — specifically, automating customer onboarding ops: ingesting new
      client schemas, generating mapping docs, drafting initial integration code,
      and producing QA checklists. The job is "reduce solutions-engineering toil without
      introducing silent data corruption." I''m hiring tools to give me deterministic,
      auditable automation — not a probabilistic agent committee.

      '
    adoption_trajectory: 'Subject is Dana R., Staff Engineer / de facto Head of Platform
      at a 40-person Series A B2B SaaS in Denver. ~12 years experience, heavy Python/Airflow/Temporal
      background.


      Awareness: Saw multi-agent frameworks (AutoGen, CrewAI, LangGraph) blow up on
      HN in mid-2024. Trialed CrewAI in Oct 2024 for the onboarding-mapping use case.
      Ran a weeklong spike on a Rooben-adjacent tool (not Rooben itself — a competitor
      with the same "agent DAG + refine chat" shape) in Jan 2025. Inflection point:
      during the spike, a "QA agent" silently approved a mapping where the planner
      agent had dropped a PII column. That bug shipped to a staging env and was caught
      by a human three days later. Dana killed the evaluation, wrote an internal memo
      titled "Why we''re not doing multi-agent," and has since been actively vocal
      on LinkedIn and in a Denver eng Slack against multi-agent orchestrators. Now
      uses a single LLM call inside a Temporal workflow with hard-coded deterministic
      checks between steps.

      '
    last_concrete_episode: 'Two weeks ago, a peer CTO DM''d Dana asking if they should
      try Rooben Pro for their RevOps workflow. Dana pulled up the Rooben landing
      page on a Zoom screenshare, pointed at the DAG visualization, and walked the
      CTO through exactly what would go wrong. Specifically: Dana recounted the Jan
      2025 CrewAI spike — set up a 4-agent pipeline (ingest → planner → codegen →
      QA), ran it on 6 real client schemas. 2 of 6 runs looked perfect but had subtle
      mapping errors (one dropped a nullable PII field, one coerced a timestamp to
      string and the QA agent wrote a passing test against the wrong column). Dana
      spent ~6 hours debugging the handoff between planner and QA — the planner''s
      output JSON had a field the QA agent was ignoring because of a prompt drift.
      Dana said on the call: "the DAG shows you the shape, not the semantics. I could
      see every node green and still be shipping garbage." The CTO didn''t adopt.

      '
    constraint_profile: '- Team size: 40 total, 6 engineers, Dana is the sole platform
      owner

      - Budget: has discretionary up to ~$500/mo for tooling without approval; above
      that needs CEO sign-off

      - Compliance: SOC2 Type II in progress, customers include 2 healthcare-adjacent
      firms — any tool touching customer data needs audit logging and deterministic
      replay

      - Time: ~20% of Dana''s week is available for platform/tooling work

      - Tooling floor: must integrate with Temporal, Datadog, and their existing Postgres
      audit log

      - Hard constraint: "no probabilistic step can be terminal" — every LLM output
      must be verified by deterministic code before causing side effects

      '
    failure_or_abandonment_mode: 'Moment of abandonment: the Jan 2025 CrewAI run where
      the QA agent returned "PASS" on a mapping that had silently dropped a PII column.
      Dana said aloud on Loom recording to the team: "the scariest possible failure
      mode just happened — it lied with confidence, and another agent cosigned the
      lie." Dana didn''t abandon because of bugs; abandoned because the failure class
      (plausible-but-wrong outputs cross-validated by peer agents) is structurally
      unfixable without the kind of deterministic gates that make the multi-agent
      framing pointless. Dana''s stance hardened from "not yet" to "actively against"
      when the competitor tool''s conversational refine flow responded to Dana''s
      bug report by suggesting a prompt tweak to the QA agent — "they wanted me to
      fix a safety-critical bug with a prompt."

      '
    decision_topology: 'Solo for tools under $500/mo, but Dana is the functional gatekeeper
      for all infra. CEO rubber-stamps Dana''s recommendations. Bottom-up: Dana trials
      on a spike budget (usually one week), writes a memo, circulates to the eng Slack.
      No formal budget cycle — tools get added/cut continuously. Dana''s memos carry
      weight beyond the company; gets cited in the Denver eng community. This is why
      "actively-anti" matters — Dana is a node in a small network of technical decision-makers.

      '
    anti_model_of_success: 'A bad outcome is "silent partial correctness" — a pipeline
      that runs green, produces output that looks right, and is wrong in a way that
      only surfaces in production a week later when a customer notices their data
      is mapped incorrectly. Dana is explicitly avoiding: (1) systems where multiple
      stochastic components cross-validate each other, (2) tools that make debugging
      harder than writing the code yourself, (3) abstractions that obscure which step
      actually produced the error, (4) vendor pitches that respond to correctness
      bugs with "try a better prompt."

      '
    verbatim_quote_bank:
    - key: Q1
      text: I sat there looking at six green checkmarks on the DAG and realized I
        had no idea if any of it was actually correct. That's when I closed the tab
        and went back to Temporal.
    - key: Q2
      text: What I do now is one LLM call, wrapped in a Temporal activity, with a
        deterministic validator that owns the go/no-go. The LLM proposes, my code
        disposes. If I need a second 'agent,' it's another Temporal activity with
        its own validator — not a chat between two prompts pretending to be coworkers.
    - key: Q3
      text: What's missing is a semantic contract between agents. The DAG shows you
        the shape, not the semantics. I could see every node green and still be shipping
        garbage. Nobody has solved that, and I don't think prompts can.
    - key: Q4
      text: My first reaction when the QA agent returned PASS on the broken mapping
        was, honestly, 'oh, fuck.' Not because it failed — because it failed and another
        agent cosigned the lie.
    - key: Q5
      text: The scariest possible failure mode is a plausible wrong answer that another
        probabilistic step rubber-stamps. Multi-agent systems don't reduce that risk,
        they compound it. That's the outcome I'm organizing my entire stack to prevent.
  - subject_id: subject-11
    adoption_status: actively-anti
    context_segment: B2C-high-autonomy
    jtbd: 'Maya Chen, 34, solo indie hacker running a one-person content-analytics
      SaaS (~$8K MRR)

      that scrapes creator pricing data across Patreon/Substack/Ko-fi and produces
      weekly

      benchmark reports for ~140 paying creators. Her JTBD is: "reliably produce the
      Monday

      benchmark digest every week without me babysitting it for 6 hours on Sunday
      night."

      She''s hiring automation to replace a checklist of ~11 scrape → normalize →
      classify →

      summarize → publish steps. She explicitly does NOT want to hire a tool to "think"
      — she

      wants deterministic execution of a pipeline she already understands.

      '
    adoption_trajectory: 'Aware → trialed 3 multi-agent tools (CrewAI-based stack
      in Feb 2025, an AutoGen side

      project around April, and Lindy.ai in June 2025) → rejected all three → now
      actively

      warns other indie hackers in her Slack groups (Indie Worldwide, MegaMaker) against

      them. Inflection point was a specific Sunday in late June when a Lindy multi-agent

      flow silently published a digest with fabricated pricing numbers for two creators.

      She had to send a correction email to 140 subscribers at 11pm. Since then she''s

      moved to a single Python script with explicit function calls and one narrowly-scoped

      LLM call for summarization. She posts in Slack roughly monthly telling people

      "multi-agent is a trap for solos."

      '
    last_concrete_episode: 'Two weeks ago a founder in her Slack DMed her a link to
      Rooben Pro and asked if she''d

      seen it. She clicked, watched the 90-second demo of the visual DAG, and within
      about

      four minutes she closed the tab and wrote back a ~200-word reply telling him
      not to

      bother. Her specific reasoning in that reply: "I''ve been burned three times.
      The DAG

      looks pretty but the pretty DAG is exactly what fooled me last time — I could
      SEE the

      handoffs and I still couldn''t predict when they''d break." She then pasted
      him her

      Python repo structure as an alternative. She logged this as the fourth time
      in 2025

      she''s talked someone out of a multi-agent tool.


      The anchor episode she keeps returning to: June 22, 2025, Lindy digest run.
      She had

      built a 5-agent flow (scraper → normalizer → classifier → writer → publisher).
      Her

      first two weekly runs worked. Run 3 produced a digest that looked perfect —
      well-

      formatted, right tone, right creators. She skimmed it, approved publish. Monday

      morning two creators emailed saying their listed prices were wrong by ~40%.
      She

      traced it: the classifier agent had hallucinated a "promotional tier" field
      that the

      normalizer then averaged into the headline price. No error was thrown. Every
      agent

      "succeeded."

      '
    constraint_profile: 'Solo operator, no team to delegate verification to. Budget
      is tight-ish but not the

      binding constraint (~$400/mo tool budget, she''d pay more for something that
      worked).

      Binding constraints: (1) her own time on Sunday nights, (2) reputational risk
      to 140

      paying subscribers — one bad digest costs her ~4-6 churns at $29/mo, (3) no
      ability

      to absorb "probably right" outputs because she can''t afford a QA step. She
      needs

      deterministic-enough execution that she can sleep through it.

      '
    failure_or_abandonment_mode: 'Abandonment wasn''t a single event — it was a pattern
      across three tools. The

      consistent failure mode: multi-agent systems produced plausible-but-wrong outputs

      that passed surface inspection. Specifically, the June 22 Lindy episode where
      the

      classifier hallucinated a field and the pipeline propagated the error without

      raising anything. Her stated reason: "Silent wrong is worse than loud broken.

      Loud broken I can catch in 10 seconds. Silent wrong costs me a customer." She

      abandoned Lindy within 4 days of that incident. She didn''t try the "refine"
      chat

      feature Lindy had because by then she didn''t trust the substrate — refining
      the

      prompt wouldn''t fix the fact that agent B trusted agent A''s output uncritically.

      '
    decision_topology: 'Solo. No committee, no approval. She decides on a tool in
      one sitting, usually

      triggered by a specific pain (a bad Sunday). She trials for 1-2 weeks against

      her real workload. No separate eval vs. prod — her trial IS prod. Budget cycle

      is monthly and she''ll cancel mid-month without hesitation. Heavy influence
      from

      two Slack communities where she both sources recommendations and posts warnings.

      '
    anti_model_of_success: 'A tool that "mostly works" and produces outputs she has
      to fully re-verify anyway.

      The worst outcome is a system confident enough to publish but wrong often enough

      that she ends up reading every output end-to-end — which means she''s doing
      the

      work twice: once building the automation, once verifying it. She''d rather have
      a

      dumb cron job that fails loudly than a smart pipeline that lies smoothly.

      '
    verbatim_quote_bank:
    - key: Q1
      text: I was sitting there at 11pm writing a correction email to 140 people and
        I just thought, I built this to save Sunday nights and now I'm doing Sunday
        night AND Monday night. That was it. I was done with agents.
    - key: Q2
      text: I rewrote the whole thing as one Python file. Like, embarrassingly basic.
        Functions calling functions. One LLM call for the summary paragraph at the
        end, and I diff the output against last week's before it sends. If any number
        moved more than 30% I get a Slack ping and it doesn't publish. That's my whole
        system.
    - key: Q3
      text: What's missing is any agent admitting it doesn't know. They all just…
        confidently hand off garbage to the next one. There's no 'I'm 60% on this,
        check me.' It's all 100% or crash, and crash is actually the good outcome.
    - key: Q4
      text: When I saw the digest looked perfect and then got those emails Monday
        morning — that was the worst feeling. Worse than if the whole thing had just
        errored out. Because now I can't trust my own eyes on the output.
    - key: Q5
      text: The trap is a tool that's right 85% of the time. That's the death zone
        for a solo. 85% means I still have to read every word, which means I saved
        zero time, AND I'm one bad week from losing customers. I need 99.5 or I need
        it to fail loud. The middle is poison.

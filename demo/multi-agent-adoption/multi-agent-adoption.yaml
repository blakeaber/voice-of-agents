      laptop and cancelled the seat. [source: evidence/subject-07.md Q1] [source:
      evidence/subject-10.md Q4]

      [source: evidence/subject-12.md Q1] [source: evidence/subject-05.md Q4]

      '
    constraint_profile: 'Mid-market to regulated-enterprise context. Discretionary
      budget typically $500/mo solo,

      higher amounts route through VP/procurement. SOC2 Type II is table stakes; HIPAA/PCI/BAA/self-

      hosted-VPC required in regulated segments. Team is small (4-6 engineers) with
      no dedicated

      ML/AI ops headcount, so tools cannot require a full-time maintainer. Time budget
      for tooling

      experiments is ~20% of one engineer''s week. Hard floor: inter-agent handoffs
      must be logged,

      replayable, and auditable; no probabilistic step can be terminal — deterministic
      code must own

      the go/no-go before any side effect. [source: evidence/subject-01.md Q2]

      [source: evidence/subject-07.md Q3] [source: evidence/subject-10.md Q2] [source:
      evidence/subject-12.md Q3]

      '
    failure_or_abandonment_mode: 'Abandons (or freezes scope) the moment coordination
      between agents produces a confident,

      well-formatted output that is subtly wrong in a way only surfaced by manual
      re-verification.

      The trigger is not breakage — it''s a plausible-wrong output that another stochastic
      step

      cosigned. Refine/prompt-tweak loops actively make it worse because they accumulate
      untestable

      technical debt and signal that the vendor treats correctness as a prompt-engineering
      problem.

      The verification tax erases the automation ROI: "I haven''t automated anything,
      I''ve just added

      a verification step to my job." [source: evidence/subject-01.md Q5] [source:
      evidence/subject-05.md Q3]

      [source: evidence/subject-10.md Q5]

      '
    decision_topology: 'Bottom-up, engineer-champion driven. Trials solo or with one
      peer on a credit card / discretionary

      budget, pilots 2-8 weeks on synthetic or low-stakes data, then writes an internal
      memo. In flat

      orgs the memo is the decision; in regulated orgs it funnels into architecture
      review, InfoSec, GRC,

      and legal, where the persona has unilateral kill authority but not unilateral
      greenlight authority.

      Actively rejects tools that gate trial behind a sales call. Memos and LinkedIn
      posts from this

      persona propagate through a small network of peer technical decision-makers.

      [source: evidence/subject-01.md Q4] [source: evidence/subject-07.md Q1] [source:
      evidence/subject-10.md Q5]

      '
    anti_model_of_success: 'The outcome being organized against is "silent partial
      correctness" — a pipeline that runs green,

      produces beautiful output, is wrong in ways the reviewer won''t catch, and is
      cosigned by another

      probabilistic agent that launders the error as verified. Downstream consequences:
      a PM builds a

      roadmap on a fabricated quote, a member gets denied on a hallucinated policy
      citation, a customer

      receives a vendor questionnaire misrepresenting security posture, a PII column
      ships to staging

      mapped wrong. The persona would rather have a loud crash than a plausible lie.
      Vendors who

      respond to a correctness bug with "try a better prompt" are disqualified permanently.

      [source: evidence/subject-05.md Q5] [source: evidence/subject-07.md Q5] [source:
      evidence/subject-10.md Q5]

      [source: evidence/subject-12.md Q5]

      '
    verbatim_quote_bank:
    - key: Q1
      text: The worst outcome isn't that it fails. The worst outcome is that it gives
        me an answer that's seventy percent right and I have to audit it to find the
        thirty percent that's wrong. At that point I haven't automated anything, I've
        just added a verification step to my job.
    - key: Q2
      text: The scariest possible failure mode is a plausible wrong answer that another
        probabilistic step rubber-stamps. Multi-agent systems don't reduce that risk,
        they compound it. That's the outcome I'm organizing my entire stack to prevent.
    - key: Q3
      text: What's missing is a contract between agents. Not a prompt, a contract
        — schema, required fields, and a hard stop if the upstream agent can't meet
        it. Right now it's all vibes between the nodes.
    - key: Q4
      text: My first reaction when the QA agent returned PASS on the broken mapping
        was, honestly, 'oh, fuck.' Not because it failed — because it failed and another
        agent cosigned the lie.
    - key: Q5
      text: The worst version of this is a confidently wrong answer that gets past
        the reviewer because the reviewer trusts the chain. Hard errors I can live
        with. Plausible-wrong in a regulated context is how you end up in front of
        an auditor with nothing good to say.
  - uxw_id: UXW-02
    name: Maya
    segment_source: Solo Operators Retreating to Single-LLM Scripts
    subject_ids:
    - subject-02
    - subject-04
    - subject-06
    - subject-11
    jtbd: 'A solo operator hiring a multi-agent workflow tool to collapse a recurring
      weekly content/production chore (newsletter digest, listing factory, benchmark
      report) into something she can trigger and walk away from — research → write
      → QA → publish without babysitting it at 6am Sunday or 11pm Monday. She explicitly
      does NOT want to hire a tool to "think"; she wants deterministic execution of
      a pipeline she already understands, so she can spend her scarce hours on original
      work instead of orchestration glue. [source: evidence/subject-11.md JTBD] [source:
      evidence/subject-06.md JTBD] [source: evidence/subject-02.md JTBD]

      '
    adoption_trajectory: 'Discovers tools through podcasts, HN Show-HN threads, YouTube
      walkthroughs, and indie-hacker Slack communities. Signs up for free tier the
      same night, rebuilds a real weekly pipeline from a template on a Saturday, iterates
      prompts via conversational refine for a few days, then flips it live against
      actual production traffic (trial IS prod). Inflection happens within 4–14 days
      when a multi-agent run silently ships a plausible-but-wrong output — a fabricated
      arXiv link, a "reactive celadon" mug, hallucinated pricing numbers, a greenwashed
      B-Corp claim. Response is either full cancellation, partial retreat to using
      one agent as a draft tool, or rewriting the whole thing as a single Python file
      with one narrowly-scoped LLM call. [source: evidence/subject-06.md adoption_trajectory]
      [source: evidence/subject-11.md adoption_trajectory] [source: evidence/subject-04.md
      adoption_trajectory]

      '
    last_concrete_episode: 'Sunday night, late June: a multi-agent flow silently published
      a digest with fabricated pricing numbers for two creators. Sitting at 11pm writing
      a correction email to 140 paying subscribers, she realized she''d built the
      automation to save Sunday nights and was now doing Sunday AND Monday nights.
      Within 4 days she cancelled, rewrote the pipeline as one embarrassingly basic
      Python file — functions calling functions, one LLM call for the summary paragraph,
      a diff against last week''s output, and a Slack ping that blocks publish if
      any number moves more than 30%. [source: evidence/subject-11.md Q1] [source:
      evidence/subject-11.md Q2] [source: evidence/subject-06.md Q2]

      '
    constraint_profile: 'Solo operator, team size 1 (occasionally 1.5 with a part-time
      helper or partner who sees the bill). Time is the binding constraint — Sundays
      and late weeknights only, no Saturday to "learn the tool." Budget is real but
      not the blocker ($29–$400/mo range); cancels mid-month without ceremony. No
      approval chain, personal card. No compliance layer, but reputational risk to
      140–4,200 paying subscribers is existential — one bad send costs real churn.
      No QA step available because there''s no one to delegate verification to. Tech
      comfort is high (Python, can read a DAG, writes her own scrapers) but she refuses
      to maintain a third orchestrator on top of Zapier/Notion/Shopify/Beehiiv. [source:
      evidence/subject-11.md constraint_profile] [source: evidence/subject-04.md constraint_profile]
      [source: evidence/subject-02.md constraint_profile]

      '
    failure_or_abandonment_mode: 'The abandonment trigger is never the hallucination
      itself — she expects LLM error as a baseline. It''s the discovery that multi-agent
      coordination LAUNDERS a single upstream hallucination through downstream "validations,"
      so a fabricated field emerges as a confident falsehood with a green QA checkmark.
      Partial correctness (80% fine, one fabricated item buried mid-output) is worse
      than a crash, because a crash she catches before publish and a plausible lie
      ships under her name. She''d rather have one dumb LLM call she doesn''t trust
      than four agents that lie to her smoothly. Retreat path is either (a) cancel
      and rewrite as a single Python file with one LLM call plus regex/diff guardrails,
      or (b) cherry-pick one agent''s output at a time, copy into Notion, eyeball,
      paste by hand. [source: evidence/subject-06.md failure_mode] [source: evidence/subject-11.md
      failure_mode] [source: evidence/subject-04.md failure_mode]

      '
    decision_topology: 'Pure solo, bottom-up, trial-driven. Sources tools from podcasts,
      HN, YouTube, and two indie-hacker Slack communities (Indie Worldwide, MegaMaker)
      where she also posts warnings. Decides in one sitting, usually triggered by
      a specific pain like a bad Sunday. Trial IS prod — no separate eval environment.
      Monthly billing only, never annual. Cancels aggressively and without ceremony
      the moment she can''t point to a concrete win from the last 2 weeks; has cancelled
      Zapier, n8n, CrewAI, AutoGen, and Lindy in the previous 6 months for the same
      reason. Post-abandonment, actively warns peers in Slack roughly monthly that
      "multi-agent is a trap for solos." [source: evidence/subject-11.md decision_topology]
      [source: evidence/subject-06.md decision_topology] [source: evidence/subject-02.md
      decision_topology]

      '
    anti_model_of_success: 'Explicitly avoids any tool that is right 85% of the time
      — "the death zone for a solo," because 85% means she still has to read every
      word, which means she saved zero time AND she''s one bad week from losing customers.
      Avoids tools that sound confident while being wrong, tools with opaque agent
      logs where debugging one dropped field takes an hour, and tools that require
      her to become a prompt engineer to keep them working. Takes "flaky and honest"
      over "smooth and occasionally lying" every time. The nightmare outcome is being
      the kind of indie hacker whose newsletter/store gets a reputation for AI slop
      while she pays $49/mo for the illusion of automation. [source: evidence/subject-11.md
      Q5] [source: evidence/subject-06.md Q5] [source: evidence/subject-02.md Q5]

      '
    verbatim_quote_bank:
    - key: Q1
      text: I was sitting there at 11pm writing a correction email to 140 people and
        I just thought, I built this to save Sunday nights and now I'm doing Sunday
        night AND Monday night. That was it. I was done with agents.
    - key: Q2
      text: I went back to my crappy Python script with a single Claude call and a
        regex that checks every URL returns 200. It's ugly but it doesn't pretend.
    - key: Q3
      text: What's missing is any agent admitting it doesn't know. They all just…
        confidently hand off garbage to the next one. There's no 'I'm 60% on this,
        check me.' It's all 100% or crash, and crash is actually the good outcome.
    - key: Q4
      text: When I saw the QA agent had green-checked a paper that didn't exist, that's
        when I was like, okay, I'm paying this thing to lie to me more efficiently.
    - key: Q5
      text: The trap is a tool that's right 85% of the time. That's the death zone
        for a solo. 85% means I still have to read every word, which means I saved
        zero time, AND I'm one bad week from losing customers. I need 99.5 or I need
        it to fail loud. The middle is poison.
  - uxw_id: UXW-03
    name: Maya
    segment_source: Pre-Refusal Pattern-Matchers
    subject_ids:
    - subject-08
    - subject-09
    jtbd: 'Hire a multi-agent automation to replace brittle chains of scripts and
      point-to-point

      integrations for a reasoning-heavy internal pipeline — e.g., ticket triage with

      enrichment and draft generation, or weekly customer-health synthesis across
      Zendesk,

      Mixpanel/Snowflake, and Salesforce — so a lean technical team can stop babysitting

      the pipeline and spend their time on decisions rather than data-gathering or

      middle-of-the-night debugging. [source: evidence/subject-08.md JTBD; evidence/subject-09.md
      JTBD]

      '
    adoption_trajectory: 'Heard about the tool through technical channels (Hacker
      News threads, Twitter/X

      discussions of CrewAI/AutoGen, podcast ads, internal hack-day demos of LangGraph).

      Either signed up for a trial and dug in for ~1-2 weeks against replayed real
      data,

      or signed up for access and never logged in past email verification — both paths

      end in rejection shaped by prior exposure to multi-agent failures, their own
      or a

      peer''s. Already pattern-matched the category as "demo-grade until proven otherwise"

      before the first click. [source: evidence/subject-08.md Adoption trajectory;

      evidence/subject-09.md Adoption trajectory]

      '
    last_concrete_episode: 'During evaluation, hit a demo where a multi-agent handoff
      produced a plausible-but-wrong

      output — in one case a response draft that referenced a cancelled customer''s
      plan as

      active, in a parallel peer story a 4-agent PR reviewer that produced a confidently

      wrong code review that nearly got merged. Attempted the conversational refine
      flow

      and could not determine if the refinement was durable, versionable, or reviewable,

      nor could they see the literal prompt the next agent received. Closed the tab.

      [source: evidence/subject-08.md Failure mode Q1, Q3; evidence/subject-09.md
      Adoption

      trajectory, Failure mode Q1]

      '
    constraint_profile: 'Tiny operational surface — 2 engineers on a 6-person startup,
      or a solo internal-tools

      owner at a ~120-person Series B — so whoever adopts the tool also owns it on-call.

      Budget is not the binding constraint (happy to pay $100-$200/mo); debuggability
      and

      data handling are. Hard constraints include SOC2-friendly data flow, data that

      can''t leave the VPC without a DPA, and the rule that any automation touching

      customer-facing output must be debuggable by a non-author engineer within ~10
      minutes.

      Significant tooling gravity toward existing stacks (n8n, Airflow, dbt, Python,

      Postgres, OpenAI API). [source: evidence/subject-08.md Constraint profile;

      evidence/subject-09.md Constraint profile]

      '
    failure_or_abandonment_mode: 'Abandonment is triggered not by a loud failure but
      by a second plausible-but-wrong

      output after a "refine" attempt, which confirms the abstraction is leaky in
      ways

      the user can''t reason about. The core refusal is epistemic: they cannot see
      the

      literal prompt one agent sent another, cannot diff the handoff, and cannot

      code-review a conversation. Once the category is tagged as "confidently wrong
      in

      ways I can''t reconstruct," they stop investing — either closing the tab mid-trial

      or never starting. They fall back to uglier, more verbose tooling (printf-debugged

      n8n, 400-line single-prompt Python cron) specifically because those fail loudly

      and legibly. [source: evidence/subject-08.md Failure mode Q1, Q2, Q3;

      evidence/subject-09.md Failure mode Q1, Q2, Q3]

      '
    decision_topology: 'Bottom-up and trial-driven for anything that runs on their
      laptop or a personal

      sandbox — solo decision, no procurement. The moment production data or another

      team''s workflow is involved, it becomes a committee decision (VP Eng, end-user

      lead, Security/SOC2 review). Having been burned before, they pre-filter tools

      against committee criteria before starting an evaluation they can''t finish,
      and

      they kill any trial whose demo produces output they have to caveat to a

      co-founder or stakeholder. [source: evidence/subject-08.md Decision topology;

      evidence/subject-09.md Decision topology]

      '
    anti_model_of_success: 'The explicit nightmare is a tool that shifts work from
      "doing the task" to

      "auditing the machine" — automation that produces plausible-looking but subtly

      wrong outputs that get acted on (a cancelled customer treated as active in an

      outbound draft, a healthy account flagged at-risk to the CS team) and whose

      reasoning lives in ephemeral inter-agent messages that can''t be reconstructed
      on

      Tuesday morning. They would take a hundred loud, obvious errors over one

      silent partial correctness. Green checks on a DAG are anti-signal, not

      reassurance. [source: evidence/subject-08.md Anti-model Q5;

      evidence/subject-09.md Anti-model Q5]

      '
    verbatim_quote_bank:
    - key: Q1
      text: When the second draft came back wrong in a different way, I just closed
        the tab. I was like, I'm not doing this — I can't debug a system that lies
        confidently.
    - key: Q2
      text: My workaround is embarrassing — it's 400 lines of Python, one giant prompt,
        and a cron. But when it breaks, I know exactly which line lied to me.
    - key: Q3
      text: 'What''s missing is a diff. Show me: this is what agent two told agent
        three, here''s the handoff, here''s where it drifted. Until I can see the
        seams, it''s a black box with extra steps.'
    - key: Q4
      text: The second I saw four agents on the canvas my first thought was, great,
        now I have four things that can hallucinate at each other.
    - key: Q5
      text: I don't want a tool that's confidently wrong. I'd take a hundred obvious
        errors over one plausible-looking mistake that ends up in a customer's inbox.
  - uxw_id: UXW-04
    name: Maya
    segment_source: Hedged Partial Adopters
    subject_ids:
    - subject-03
    - subject-04
    - subject-12
    jtbd: 'Hiring a multi-agent workflow tool to offload repetitive, context-heavy
      drafting work —

      feedback triage, listing/caption generation, or compliance-adjacent drafting
      — so that a

      multi-hour chore collapses into a trigger-and-review step, without replacing
      the operator''s

      judgment on the final output. The goal is reliable drafts they can verify in
      minutes, not

      autonomous end-to-end execution. [source: evidence/subject-03.md Q2] [source:
      evidence/subject-04.md Q2] [source: evidence/subject-12.md Q2]

      '
    adoption_trajectory: 'Discovered the tool through a technical community channel
      (HN, Latent Space, YouTube indie

      hacker), signed up same-day on a free or low-tier plan, built or imported a
      workflow within

      hours. First runs partially worked. Within 10-15 days, a coordination failure
      — an upstream

      agent producing malformed or stale output that a downstream agent accepted without

      validation — triggered a retreat. They did not churn. Instead they shrank scope:
      kept the

      simplest, most-verifiable workflow in use and either dropped the higher-value
      pipeline back

      to manual single-prompt execution, cherry-pick one agent at a time, or froze
      pilot

      expansion. Stable but ceiling-constrained usage persists. [source: evidence/subject-03.md
      Q1] [source: evidence/subject-04.md Q2] [source: evidence/subject-12.md Q1]

      '
    last_concrete_episode: 'A coordination handoff where one agent produced a plausible,
      confidently-wrong output built

      on bad or stale upstream input — a feedback summary missing 38 of 41 tickets,
      a "cozy soup

      season" caption on a coffee mug listing, or a vendor questionnaire answer misrepresenting

      encryption posture based on a stale cached doc. The failure was not a crash;
      it passed

      surface-level checks and was only caught by comparing to source of truth or
      by a human

      reviewer reading every line. That moment became the retreat trigger. [source:
      evidence/subject-03.md Q1] [source: evidence/subject-04.md Q1] [source: evidence/subject-12.md
      Q1]

      '
    constraint_profile: 'Time is the dominant constraint — cannot spend a weekend
      debugging orchestration. Budget is

      secondary but real (monthly gut-check against concrete ROI; trials on free tier,
      never

      annual commit). Verification cost is the binding economic variable: if checking
      every

      agent''s work takes longer than doing it manually, adoption collapses. Downstream

      stakeholders (a non-technical co-founder, a brand-voice helper, an InfoSec reviewer,
      an

      auditor) cannot debug agent output, which raises the blast radius of silent
      failures. BATNA

      is always "I''ll just write the script / do it by hand," and it''s credible.
      [source: evidence/subject-03.md Q2] [source: evidence/subject-04.md Q2] [source:
      evidence/subject-12.md Q2]

      '
    failure_or_abandonment_mode: 'Partial abandonment via scope collapse, not churn.
      The triggering pattern is always the

      same: an agent accepts malformed, hallucinated, or stale input from an upstream
      agent

      without validation, produces a confident-looking output, and nothing in the
      system signals

      that a handoff was malformed. They retain the workflow where wrongness is self-evident
      on

      read (a PR description, a single listing draft, a low-risk questionnaire) and
      drop or

      freeze the workflow where wrongness is only detectable by cross-checking source
      of truth.

      They keep paying because cancellation cost exceeds the subscription. [source:
      evidence/subject-03.md Q3] [source: evidence/subject-03.md Q4] [source: evidence/subject-12.md
      Q3]

      '
    decision_topology: 'Solo, bottom-up, trial-driven initiation on a free or cheap
      tier over a single weekend.

      Evaluation is empirical: build a real workflow, see if it survives contact with
      production.

      Expansion is gated by either informal buy-in from adjacent stakeholders (partner
      on cost,

      helper on tone, co-founder on output quality) or formal gates (InfoSec, auditor).
      They are

      the de facto buyer but not always the approver. Abandonment is silent — they
      shrink scope

      rather than file a cancellation — and expansion freezes the moment a silent-failure
      class

      is discovered that they don''t have a systematic way to audit for. [source:
      evidence/subject-03.md Q2] [source: evidence/subject-04.md Q2] [source: evidence/subject-12.md
      Q1]

      '
    anti_model_of_success: 'A tool that sounds confident while being wrong — "confidently
      incomplete," "lie politely,"

      "confidently wrong." A pipeline of green checkmarks over an output that silently
      dropped

      inputs, hallucinated a detail, or propagated a stale doc. They would categorically
      rather

      have a loud error than a clean-looking summary of nothing. The worst outcome
      is a bad

      output reaching a consequential reader — a co-founder, a customer, an auditor
      — because no

      mechanism flagged the malformed handoff between agents. [source: evidence/subject-03.md
      Q5] [source: evidence/subject-04.md Q5] [source: evidence/subject-12.md Q5]

      '
    verbatim_quote_bank:
    - key: Q1
      text: When my co-founder asked if we really only had 3 tickets that week and
        I realized we'd had 41 — that's when I closed the tab and didn't open it for
        a week. I wasn't mad, I was embarrassed.
    - key: Q2
      text: There's no — like — nothing stops the pipeline when an agent hands off
        garbage. The next agent just eats the garbage and keeps smiling. I need something
        that screams when a handoff is malformed, not something that produces a prettier
        summary of nothing.
    - key: Q3
      text: Now I only run the first agent, copy the output into a Notion doc, eyeball
        it, and then paste it into Etsy myself. I basically turned their pipeline
        into one step.
    - key: Q4
      text: What's missing is — I need the handoff between agents to be a thing I
        can assert on. Like a contract. Agent 2 passed Agent 3 a doc from 2023 and
        nothing in the system went, hey, is that fine? The DAG shows me it happened,
        but only after.
    - key: Q5
      text: I don't want a tool that sounds smart and is wrong. I'd rather it fail
        loudly than lie politely.

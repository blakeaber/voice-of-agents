    failure_or_abandonment_mode: 'Not abandoned — frozen at partial. The specific
      moment of pulling back was the stale-doc incident.

      It wasn''t a hard failure (no outage, no error), it was a plausible-wrong output
      that passed three

      of four internal checks. His words: the failure mode he cannot ship into a regulated
      context is

      "confidently wrong." He kept the one low-risk workflow in prod and stopped expanding
      because every

      new workflow would require him to audit the coordination pattern for similar
      silent-failure modes,

      and he didn''t have a systematic way to do that.

      '
    decision_topology: 'Bottom-up initiation (Marcus found it, championed it), but
      gated top-down by InfoSec and his

      Director of Platform. Trial-first, budget cycle second — he ran it free on synthetic
      data for two

      months before asking for pilot budget. Expansion decisions are effectively solo
      for dev-sandbox

      use but require Security sign-off for anything production-adjacent. He is the
      de facto buyer but

      not the approver.

      '
    anti_model_of_success: 'A tool that makes him look incompetent in front of his
      auditor or a customer. Specifically: a

      generated vendor questionnaire answer that misrepresents their security posture
      goes out, the

      customer''s security team catches it, and now he''s on a call explaining why
      an AI agent

      hallucinated a control they don''t have. Second anti-model: a SOC2 finding where
      the auditor asks

      "how did you generate this evidence" and he can''t produce a clean chain of
      custody because agent

      handoffs weren''t logged in a way the auditor understands.

      '
    verbatim_quote_bank:
    - key: Q1
      text: When I saw that key rotation answer I just sat there for a second and
        thought, okay, if I hadn't read every line of this, we'd have sent a lie to
        a customer. That was the moment I was like, I'm not pitching the next workflow.
    - key: Q2
      text: I basically bolted a freshness check onto the front of the retrieval agent
        and shrunk the index down to docs tagged current-policy. It's a hack. I'm
        maintaining a tag discipline now just so the agents don't embarrass me.
    - key: Q3
      text: What's missing is — I need the handoff between agents to be a thing I
        can assert on. Like a contract. Agent 2 passed Agent 3 a doc from 2023 and
        nothing in the system went, hey, is that fine? The DAG shows me it happened,
        but only after.
    - key: Q4
      text: My first reaction when I opened the logs was, oh, this is going to be
        every workflow. Every one of these has a silent failure mode I haven't found
        yet and I'm the one who has to find them.
    - key: Q5
      text: The worst version of this is a confidently wrong answer that gets past
        the reviewer because the reviewer trusts the chain. Hard errors I can live
        with. Plausible-wrong in a regulated context is how you end up in front of
        an auditor with nothing good to say.

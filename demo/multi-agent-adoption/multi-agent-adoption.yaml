  segments:
  - name: Audit-Burdened Reliability Engineers
    description: Technical operators who have internalized that silent, plausible-but-wrong
      output is worse than loud failure. They evaluate multi-agent tools through the
      lens of verifiability and blast radius, and abandon the moment coordination
      produces confident errors they must audit manually.
    subject_ids:
    - subject-01
    - subject-05
    - subject-07
    - subject-10
    - subject-12
    primary_jtbd: Offload repetitive platform/ops toil onto automation they can trust
      to either succeed cleanly or fail loudly — never quietly hand back 80%-correct
      output that requires line-by-line verification.
    adoption_trajectory_shape: Try the tool on a bounded, high-value workflow → discover
      that green DAG nodes don't imply semantic correctness → catch one or more silent
      coordination failures → either abandon entirely (05, 07, 10) or freeze at a
      narrow, heavily-guarded subset (01, 12).
    dominant_constraint_profile: 'Production-adjacent accountability: their name is
      on the output. They have engineering skill to build deterministic alternatives
      (Temporal activities, validators, scripts) and will default to those when trust
      erodes.'
    dominant_failure_mode: Confidently-incomplete outputs where inter-agent handoffs
      lose context or fabricate state, surfaced as green checks in the DAG. The 70–85%
      correct zone is the kill zone.
    gaps_vs_product_positioning: 'Rooben Pro sells workflow composition and visual
      observability (DAG + refine).

      This segment needs semantic validation, not structural visualization — they

      need per-handoff correctness assertions, deterministic checkpoints, and

      loud-failure primitives. The DAG shows shape; they need something that

      tells them whether the shape carried correct content. The conversational

      refine flow actively repels them because it patches symptoms without

      exposing root cause, accumulating untestable debt.

      '
  - name: Solo Operators Retreating to Single-LLM Scripts
    description: One-person businesses who briefly tried agent orchestration to scale
      themselves, then concluded that multi-agent coordination multiplies hallucination
      surface area without proportional leverage. They retreat to a single LLM call
      wrapped in their own code.
    subject_ids:
    - subject-02
    - subject-04
    - subject-06
    - subject-11
    primary_jtbd: Compress a repeatable content/research/ops task from hours to minutes
      without introducing a new debugging surface they have to own alone.
    adoption_trajectory_shape: Attracted by the promise of autonomous pipelines →
      set up quickly → hit a fabricated or subtly-wrong output within days → rewrite
      as a ~60-line Python file with one LLM call → become vocal skeptics of the agent
      paradigm.
    dominant_constraint_profile: No team to absorb debugging cost. Every minute auditing
      agent output is a minute not shipping. Cannot tolerate any opaque abstraction
      layer between them and the model.
    dominant_failure_mode: Agent-to-agent hallucination chains (e.g., fabricated citations
      green-checked by a QA agent). The product becomes 'paying to lie more efficiently.'
    gaps_vs_product_positioning: 'Rooben Pro''s positioning — multi-agent DAGs with
      conversational refine —

      is itself the anti-pattern for this segment. They don''t want more agents;

      they want fewer. The gap isn''t feature-level; it''s architectural. A

      single-agent, deterministic-wrapper offering with strong validators would

      serve them; the current multi-agent framing signals exactly the failure

      mode they''re fleeing.

      '
  - name: Pre-Refusal Pattern-Matchers
    description: Technically fluent practitioners who recognize the multi-agent failure
      pattern before or at first contact and refuse to invest setup time. Their rejection
      is shaped by prior exposure (their own or peers') to silent coordination failures
      in similar tools.
    subject_ids:
    - subject-08
    - subject-09
    primary_jtbd: Avoid adopting any tool whose failure mode they've already diagnosed
      as unfixable at the abstraction layer it operates in.
    adoption_trajectory_shape: Evaluate briefly (or just look at the canvas) → recognize
      the multiplicative hallucination surface → reject quickly (day 9 for 08; never
      started for 09). Decision is pattern-matched, not experimentally derived in
      this tool specifically.
    dominant_constraint_profile: Strong priors from previous agent-framework burns
      or observed peer failures. Time cost of evaluation is the constraint — they
      won't spend weeks disproving a pattern they've already seen.
    dominant_failure_mode: The visible shape of the tool (N agents on a canvas) is
      itself the rejection trigger. 'Four agents means four things that can hallucinate
      at each other.'
    gaps_vs_product_positioning: 'Rooben Pro leads with the DAG and multi-agent decomposition
      as core value.

      For this segment, those are negative signals. The product has no surface

      that speaks to coordination-correctness guarantees before setup — no

      upfront story about validation, handoff contracts, or failure semantics.

      Integrations and pricing (08 explicitly) are irrelevant; the trust story

      is missing at the landing-page level.

      '
  - name: Hedged Partial Adopters
    description: Users who neither fully adopted nor abandoned — they carved out a
      narrow zone where the tool is used, surrounded by manual guards or parallel
      deterministic pipelines. They represent a stable but ceiling-constrained outcome.
    subject_ids:
    - subject-03
    - subject-04
    - subject-12
    primary_jtbd: Use the tool only for the subset of work where the cost of a silent
      failure is tolerable, while keeping the highest-value workflows in hand-built
      or manual form.
    adoption_trajectory_shape: Initial broad adoption → silent coordination failure
      on the high-value workflow → retrench to low-stakes uses → refine-flow retry
      produces a different subtle failure → freeze scope permanently.
    dominant_constraint_profile: They want the tool to work and have sunk setup cost,
      but cannot justify expanding scope past the first workflow that silently failed.
      Expansion requires proof of coordination reliability they can't currently obtain.
    dominant_failure_mode: Not outright rejection — scope-collapse. The refine flow's
      inability to explain *why* context was lost (only patch it) prevents them from
      ever re-trusting the abandoned workflow.
    gaps_vs_product_positioning: 'The conversational refine flow is positioned as
      the recovery path, but

      for this segment it''s the confirmation of a leaky abstraction — it

      proposes patches without exposing root cause. There''s no expansion

      on-ramp: no way to earn back scope after a silent failure. The product

      needs a ''why did this handoff fail'' diagnostic layer, not another

      generative suggestion layer, to convert partials into full adopters.'
  all_hypotheses_supported_flag: false
  cross_cutting_findings: ''
persona_research_output:
  topup_subjects:
  - subject_id: subject-13
    adoption_status: partial-adopter
    context_segment: B2B-small
    jtbd: 'I run ops at a 14-person B2B SaaS shop. I was hiring a multi-agent tool
      to automate our inbound lead enrichment → qualification → CRM-write pipeline
      so our two SDRs could spend time actually calling instead of copy-pasting from
      LinkedIn and Apollo into HubSpot. The job is: take a raw inbound form fill,
      enrich it, score it against ICP, draft a first-touch email, and stage it in
      HubSpot for SDR approval — without me babysitting it.

      '
    adoption_trajectory: 'Saw a demo on Twitter in March, signed up for the free tier
      same week. Got the enrichment → scoring chain working in about 90 minutes on
      day one and was genuinely excited. Added the email-drafting agent on day 3,
      added the HubSpot write-back on day 5. That''s when things got weird. By day
      10 I''d stopped trusting the full pipeline end-to-end. Inflection point was
      around day 8: I caught it writing a personalized email to a lead referencing
      the *previous* lead''s company name. I didn''t abandon — I still use the first
      two agents (enrich + score) as a two-step pipeline and do the rest manually.
      That''s my "partial" state. I pay for the $49/mo tier for those two steps only.

      '
    last_concrete_episode: 'Two weeks ago, Tuesday. A lead came in from our pricing
      page — a decent-sized logistics company. The enrich agent pulled the right company
      data, the scoring agent tagged it A-tier correctly. Then the email-drafting
      agent generated a note that opened "Hi Marcus, saw that Shopify just raised
      a Series..." — Marcus''s company is not Shopify. Shopify was the *previous*
      lead in the batch run from that morning. Context had leaked between runs, or
      the handoff dropped the current lead object and picked up a stale one from the
      agent''s memory. I only caught it because I manually review every draft now.
      If I hadn''t, we''d have sent a cold email referencing the wrong company to
      a qualified prospect. I spent 40 minutes trying to reproduce it in their playground,
      couldn''t, filed a support ticket, got a "we''re looking into it" reply. That
      was the moment I decided the drafting + writeback agents are staying off until
      they fix whatever that was.

      '
    constraint_profile: 'Tiny team, no engineer to debug agent internals. Budget is
      real but not the blocker — $49–$200/mo is fine if it works. Time is the hard
      constraint: I have maybe 3 hours a week to fiddle with tooling. No compliance
      pressure (we''re not regulated), but reputational risk is huge — sending a wrong-company
      email to a prospect is worse than sending no email. Decision is mine alone,
      CEO rubber-stamps anything under $500/mo.

      '
    failure_or_abandonment_mode: 'I didn''t fully abandon, I amputated. The specific
      failure was context bleed between lead objects in a batch run producing a plausible-but-wrong
      email draft. The reason I didn''t walk away entirely is that the first two agents
      (enrich, score) are deterministic enough and their outputs are easy to eyeball
      — a company name is right or wrong. The drafting agent''s failures are *plausible*,
      which is exactly what makes them dangerous. I kept the safe half, cut the risky
      half.

      '
    decision_topology: 'Solo decision, bottom-up. I try things on free tier, if they
      survive two weeks I put them on the company card. No committee, no procurement.
      I learn about tools from Twitter, HN, and one Slack community of ops people.
      Trial cycle is ~2 weeks; if I''m still using it after that, it stays.

      '
    anti_model_of_success: 'A bad outcome is automation that looks like it''s working
      but silently corrupts our CRM or our outbound. I''d rather do something manually
      for another six months than have to audit every record the tool touched to find
      out which ones are wrong. The nightmare is "we sent 200 personalized emails
      last month and 15 of them had the wrong company name and we don''t know which
      15."

      '
    verbatim_quote_bank:
    - key: Q1
      text: When I saw 'Hi Marcus, saw that Shopify just raised' — and Marcus doesn't
        work at Shopify — I just closed the laptop. I was done for the day.
    - key: Q2
      text: I chopped the pipeline in half. Enrich and score run on autopilot, everything
        after that I do by hand in HubSpot. It's basically two tools now, not one.
    - key: Q3
      text: I need to see what each agent is passing to the next one. Right now it's
        a black box with a pretty UI on top. Show me the handoff payload.
    - key: Q4
      text: Wait — where did Shopify come from? That's not this lead. That's not even
        this *week's* lead.
    - key: Q5
      text: The worst version of this is I trust it for three months, then find out
        a third of our outbound referenced the wrong companies and I have to email
        every prospect to apologize.
  - subject_id: subject-14
    adoption_status: partial-adopter
    context_segment: B2B-small
    jtbd: 'I run ops at a 14-person B2B SaaS. I was hiring a multi-agent workflow
      tool to automate our inbound lead qualification pipeline: scrape enrichment
      data, draft a tailored outreach, log to CRM, and schedule follow-ups. The job
      I actually wanted done was "give me back the 6 hours a week my SDR spends on
      research-and-draft so she can do live calls." I''m a pre-refusal pattern-matcher
      — I''ve been burned enough by tools that over-promise that I read the docs and
      community threads first, and if I see the shape of a failure I''ve seen before,
      I bail before installing. I didn''t bail on this one, but I only adopted it
      for one branch of the workflow, not the whole thing.

      '
    adoption_trajectory: 'Saw it on a founder Slack in late Q1. Watched two demos,
      read the changelog for the prior 3 months (I always do that — if every release
      is "improved reliability of X," X is broken). Signed up for the free tier, built
      a toy pipeline in an afternoon. Inflection point was day 6: I ran the full 4-agent
      chain against 20 real leads and 7 of them came back with enrichment data that
      looked right but was actually stitched from the wrong company (same name, different
      industry). The drafts were beautifully written and completely wrong. That''s
      the exact failure pattern I''d pre-refused three other tools for. Instead of
      abandoning, I amputated: kept the tool running the drafting agent only, fed
      it manually-verified enrichment from our existing Clearbit workflow. That''s
      where I''ve been for 4 months. Partial adopter.

      '
    last_concrete_episode: 'Two weeks ago I tried to re-expand scope. New release
      notes claimed "improved context passing between agents." I rebuilt the enrichment→draft
      handoff on a Tuesday morning with 10 test leads. Three of them produced drafts
      referencing a funding round that belonged to a different company with a similar
      name. Not a hallucination in the draft agent — the enrichment agent had grabbed
      the wrong Crunchbase record and passed it forward confidently. The draft agent
      had no way to know the upstream data was wrong; it just wrote a great email
      about the wrong company. I spent 40 minutes reading the step logs trying to
      figure out where the swap happened. Found it, but couldn''t configure a guardrail
      to prevent it without writing custom validation code. Rolled back to single-agent-only
      by lunch. Logged it in my notes as "same failure, new coat of paint."

      '
    constraint_profile: 'Time: I get maybe 3-4 hours a week to evaluate tooling. Budget:
      I can approve up to $200/mo solo, above that needs founder sign-off. Team: 14
      people, no dedicated ML or data eng. Compliance: light — we''re B2B so no PII
      nightmares, but wrong-company outreach damages our reputation in a small vertical.
      Tooling: we live in HubSpot, Slack, and Notion; anything that doesn''t webhook
      cleanly into those is dead on arrival.

      '
    failure_or_abandonment_mode: 'Partial abandonment on the multi-agent chain specifically.
      I didn''t abandon the tool — I abandoned trust in inter-agent handoffs. The
      specific moment: seeing the third lead in that Tuesday batch reference a $40M
      Series B that belonged to a namesake company. I didn''t rage-quit; I just quietly
      closed the tab and reverted the workflow. The reason isn''t that the tool is
      bad — it''s that the failure mode (confident wrong output from upstream error
      propagating downstream) is exactly the one where verification costs me more
      time than the automation saves. Classic pattern I''ve learned to refuse.

      '
    decision_topology: 'Solo on anything under $200/mo and reversible. I run a 2-week
      trial against real data, not demo data. If I see the pattern-match to a known
      failure mode in the first real batch, I either amputate (use a subset) or abandon.
      I don''t do committees for this tier — the founder trusts my judgment and doesn''t
      want to be in the loop until it''s working. I do post in the founder Slack when
      I kill a tool, which is how other people pattern-match off my evaluations.

      '
    anti_model_of_success: 'Bad outcome: an SDR sends 50 emails Monday morning, 8
      of them reference the wrong company''s funding round, and I find out from a
      prospect''s snarky reply on Wednesday. The tool "worked" — it ran end-to-end,
      no errors in the logs, green checkmarks everywhere — but the output was wrong
      in a way that damages relationships I can''t repair. That''s worse than the
      tool crashing. A crash I can see; a confident-wrong output I can''t.

      '
    verbatim_quote_bank:
    - key: Q1
      text: I saw the third draft reference a Series B that wasn't theirs and I just
        closed the tab. Didn't even finish the batch.
    - key: Q2
      text: I amputated it. The drafting agent stays, the enrichment agent is fired,
        and I hand-feed it from Clearbit like it's 2019.
    - key: Q3
      text: There's no way to say 'stop the chain if upstream confidence is below
        X.' The handoff is just — here's the blob, good luck.
    - key: Q4
      text: Beautiful email, wrong company. That's the worst kind of failure because
        it looks like it worked.
    - key: Q5
      text: Green checkmarks and a prospect emailing back 'we're not a fintech, did
        you even read our site.' That's the nightmare.
  - subject_id: subject-15
    adoption_status: partial-adopter
    context_segment: B2B-small
    jtbd: 'I run ops for a 14-person B2B SaaS. I was hiring a multi-agent workflow
      tool to take inbound lead enrichment + routing off my plate — pull a lead from
      HubSpot, enrich via Clearbit/Apollo, classify fit, draft a tailored intro email,
      and hand to an SDR for review. I didn''t want to replace the SDR, I wanted the
      boring 20 minutes per lead compressed to a review step.

      '
    adoption_trajectory: 'Saw a demo on LinkedIn in February. Trialed the tool the
      next weekend. Got the enrichment→classify→draft pipeline working on 10 test
      leads by Sunday night. Week 2 I tried to wire it to live HubSpot webhooks and
      that''s where it got messy. By end of week 3 I had narrowed my usage to just
      two of the four agents — I kept the enrichment + classification agents, and
      ripped out the drafting + handoff agents and replaced them with a plain Zapier
      + GPT-4 call. Inflection point was a Tuesday in week 2 when the drafter agent
      wrote an email referencing a product feature we don''t have, and I couldn''t
      tell if it was the classifier passing bad context or the drafter hallucinating.
      I stopped trusting the chain but kept the parts I could audit independently.

      '
    last_concrete_episode: 'Two weeks ago. A lead came in from a mid-market fintech.
      Enrichment agent pulled the company data correctly — I could see the JSON in
      the log. Classifier tagged them "Tier 1 — high fit." Drafter agent produced
      an email that opened with "Congrats on your Series C" — they had not raised
      a Series C. I went back through the trace and the Clearbit payload had a "last_funding_round"
      field that was null, and somewhere the drafter filled in a plausible-sounding
      placeholder. I didn''t catch it until I re-read the email before sending. That
      was the second time that pattern happened. I killed the drafter step, wrote
      a Zapier zap that just sends the enriched JSON + classification to me in Slack
      with a "draft email" button that hits GPT-4 directly with a locked prompt. Slower
      but I can see exactly what went in and what came out.

      '
    constraint_profile: 'Budget is mine to spend up to $200/mo without asking. Above
      that needs the CEO. No compliance team — I am the compliance team. Two-person
      ops/marketing function, so any tool I adopt I also support. No dev resources;
      if it doesn''t work with Zapier or a no-code builder, it''s dead to me. Time
      constraint is real — I gave this tool three weekends, that was the budget.

      '
    failure_or_abandonment_mode: 'Didn''t fully abandon — partial. The specific moment:
      re-reading the "Congrats on your Series C" email and realizing I couldn''t trace
      which agent introduced the fabrication. It wasn''t that the tool failed, it''s
      that when it failed I couldn''t tell *where*. The handoff between classifier
      and drafter was a black box to me — I could see inputs to agent 1 and outputs
      from agent 4 but the intermediate state was either buried or not logged in a
      way I could parse. So I kept the agents whose outputs I could independently
      verify (enrichment = check against LinkedIn; classification = obvious yes/no)
      and cut the ones where verification cost was higher than just doing it myself.

      '
    decision_topology: 'Solo decision under $200/mo. Bottom-up — I pick the tool,
      I prove it works, then if I want to expand seats I pitch the CEO with numbers.
      Trial-driven, not budget-cycle. I give things one weekend to prove basic value
      and two more weekends to survive real data.

      '
    anti_model_of_success: 'A tool that works great in the demo, fine on test data,
      and then produces confidently-wrong output on real leads that I send to real
      prospects. The nightmare is an SDR sending out 40 emails with hallucinated facts
      because I trusted the pipeline. I would rather have a slower, uglier workflow
      that I can audit than a fast one that embarrasses us.

      '
    verbatim_quote_bank:
    - key: Q1
      text: When I saw 'Congrats on your Series C' I just sat there for a second like
        — okay, I cannot ship this, and I cannot figure out which agent lied to me,
        so I'm done with this chain.
    - key: Q2
      text: I basically ripped the last two agents out and replaced them with a Zapier
        zap that dumps the JSON into Slack with a button. Dumber, slower, but I can
        see the seams.
    - key: Q3
      text: What's missing is — show me what agent 2 actually handed to agent 3. Not
        a summary. The literal payload. If I can't see the handoff, I can't trust
        the handoff.
    - key: Q4
      text: My first reaction was, wait, is this the classifier's fault or the drafter's?
        And then I realized I had no way to answer that question inside the tool,
        and that's when I got annoyed.
    - key: Q5
      text: The worst version of this is an SDR sending forty emails that sound great
        and are factually wrong. That's worse than the tool not existing.

      at rest posture. Caught by human reviewer. Did not abandon, but froze scope.

      '
    last_concrete_episode: 'Two weeks ago (late in the pilot), Marcus was processing
      a vendor security questionnaire from a

      potential enterprise customer. The workflow: Agent 1 parses the questionnaire
      into discrete

      questions, Agent 2 retrieves relevant policy excerpts from their Notion + internal
      wiki via an

      indexed store, Agent 3 drafts answers, Agent 4 flags anything referencing customer
      data controls

      for human review. He kicked it off Tuesday morning with ~80 questions. About
      60 ran clean. On

      question 47 — "Describe your key rotation cadence for data-at-rest encryption"
      — Agent 2 retrieved

      a policy doc from 2023 that had been superseded. Agent 3 drafted a confident
      answer citing a

      90-day rotation they no longer do (it''s now tied to KMS auto-rotation annually).
      Agent 4 did not

      flag it because the draft didn''t trip the "customer data" keyword rule. Marcus
      only caught it

      because he cross-reads every answer before sending — which was the whole point
      of the human gate,

      but it told him the agent chain couldn''t be trusted to self-police staleness.
      He spent 40 minutes

      going back through the DAG logs to figure out which agent made the wrong call.
      Turned out Agent 2''s

      retrieval was the root cause; Agent 3 did its job faithfully on bad input. He
      patched it by adding

      a freshness-check sub-step and narrowing the retrieval index, but he also quietly
      decided not to

      propose the access-review workflow to his manager that week.

      '
    constraint_profile: "- InfoSec vendor review gates any new SaaS tool (6-8 weeks\

      diff, one thing to blame."

      '
    decision_topology: 'Bottom-up for anything he runs alone on his laptop or in a
      personal sandbox — solo

      decision, trial-first. But anything touching production data or the CS team''s
      workflow

      becomes a committee decision: VP Eng, Head of CS (end user), and Security review.

      He has learned not to start evaluations he can''t finish, so he pre-filters
      tools

      against the committee criteria before even trialing. Rooben Pro failed the pre-filter

      on two axes: unclear data residency, and unclear "is this a config or a chat."

      '
    anti_model_of_success: 'The nightmare is a Monday morning where the CS team has
      already acted on an

      automated digest that was confidently wrong — e.g., flagged a healthy account
      as

      at-risk, or missed a real churn signal — and he can''t reconstruct *why* the
      agents

      produced what they produced because the reasoning lives in ephemeral inter-agent

      messages. Silent partial correctness is worse to him than a loud crash. A loud
      crash

      he can page on; a plausible-but-wrong summary gets acted on.

      '
    verbatim_quote_bank:
    - key: Q1
      text: I watched the refine step and just went, nope, I can't code-review a conversation.
        Closed the tab.
    - key: Q2
      text: My workaround is embarrassing — it's 400 lines of Python, one giant prompt,
        and a cron. But when it breaks, I know exactly which line lied to me.
    - key: Q3
      text: 'What''s missing is a diff. Show me: this is what agent two told agent

    - Complete primary task
    - Verify outcome meets success definition
    success_criteria:
    - 'Task completed without triggering failure mode: Partial abandonment via scope
      collapse, not churn. The trigg'
    persona_evaluation_rubric: 'Rate on: speed to value, trust, absence of ''A tool
      that sounds confident while being wrong — "confidentl'''
  archived_prior_personas: []
  coverage_map:
    Audit-Burdened Reliability Engineers: 6
    Solo Operators Retreating to Single-LLM Scripts: 5
    Pre-Refusal Pattern-Matchers: 3
    Hedged Partial Adopters: 4
workflow_research_output:
  uxw_id: UXW-01
  episodes:
  - episode: primary-task
    date: 3 weeks ago
    pre_state: 'Thursday afternoon, about 2pm. We had a Tier-1 escalation backlog
      from the prior week that

      needed a voice-of-customer brief for the Monday product review — seventeen support
      threads,

      six recorded calls, and a pile of Zendesk macros. Normally this eats a full
      day of my time

      because I don''t trust anyone else on the team to tag intent correctly, and
      the PMs will

      absolutely build roadmap bets off whatever I hand them. I''d been piloting a
      multi-agent

      setup for about five weeks at that point — a fetch agent pulling from Zendesk
      + Gong, a

      chunker, an extraction agent pulling quotes + claims, a QA agent checking that
      every

      extracted quote had a verifiable source_id + timestamp, and a synthesis agent
      producing the

      brief. Running on my own $500/mo budget, sandboxed, no production data beyond
      the escalation

      corpus itself (which is already internal). I had schema contracts bolted on
      between the

      extraction and QA steps after an incident in week three. SOC2 review on the
      vendor was clean.

      Pressure was medium — Monday deadline, but also I''d told the VP the pilot was
      "promising,"

      so I had some skin in this run going clean end-to-end.

      '
    steps:
    - step: Scope the run and freeze inputs
      tool: Notion + Zendesk
      input: Escalation tag filter for the prior 7 days, Gong call IDs from the CS
        weekly
      output: A frozen list of 17 ticket IDs and 6 call IDs in a Notion doc, with
        a run_id
      time: '20'
      blocker: Two tickets had been merged mid-week and Zendesk gave me the merged
        ID; I had to manually chase the original IDs because the merge rewrites history
        and my fetch agent would have silently pulled the survivor only.
    - step: Kick off fetch agent against the frozen input set
      tool: multi-agent tool (sandbox)
      input: run_id + 23 source IDs
      output: Raw transcripts + ticket bodies dumped to object storage, indexed by
        source_id
      time: '8'
      blocker: One Gong call pulled with no speaker diarization — fetch agent returned
        success but the payload was a single undifferentiated blob. Schema contract
        I'd written only checked for non-empty transcript, not speaker turns. Noted
        for later.
    - step: Run chunker + extraction agent
      tool: multi-agent tool
      input: 23 fetched sources
      output: 142 candidate quotes + 38 claims, each tagged with source_id and character
        offset
      time: '12'
      blocker: none
    - step: QA agent pass — verify every quote resolves to its source
      tool: multi-agent tool
      input: 142 quotes + original sources
      output: QA returned PASS on 139, FAIL on 3 (good — those were real OCR artifacts
        from a PDF attachment)
      time: '6'
      blocker: This is the step I watch like a hawk. Three weeks prior the QA agent
        had cosigned a hallucinated quote and I nearly shipped it. I now run a deterministic
        post-QA check — a plain Python script I wrote — that re-extracts the quote
        substring from the source by offset and does a literal string match. Belt
        and suspenders.
    - step: Run my deterministic verifier script
      tool: Python (local, my own script)
      input: QA-passed quotes + source blobs
      output: 137 literal matches, 2 mismatches flagged
      time: '4'
      blocker: Two quotes the QA agent PASSED did not literal-match the source. One
        was a paraphrase the extraction agent had quietly rewritten ('can't' → 'cannot').
        The other was worse — a quote attributed to the wrong speaker on the Gong
        call with no diarization (the fetch issue from earlier surfacing downstream).
        This is exactly the failure mode I'm organized against. I stopped the pipeline
        here.
    - step: Decide whether to continue or kill the run
      tool: none (thinking, pacing, coffee)
      input: Two confirmed plausible-wrong outputs that passed a probabilistic QA
        step
      output: 'Decision: continue, but manually resolve the two flagged items and
        log the fetch-agent diarization gap as a P1 contract to add before next run'
      time: '15'
      blocker: I genuinely considered killing the pilot here. Five weeks in and the
        QA agent still can't catch a paraphrase. The only reason I didn't is that
        my deterministic verifier DID catch it — the system as a whole behaved correctly
        because I don't trust the probabilistic step to be terminal. That's the design
        working. But it was close.
    - step: Manually resolve the 2 flagged quotes
      tool: Zendesk + Gong (web UI) + Notion
      input: 2 flagged quote candidates
      output: 1 quote corrected (paraphrase → exact), 1 quote dropped entirely (speaker
        unverifiable)
      time: '18'
      blocker: The dropped quote was actually the most vivid one in the corpus. Losing
        it weakened the brief. But shipping a misattributed quote to a PM building
        roadmap is exactly the downstream harm I won't cause.
    - step: Run synthesis agent on the cleaned, verified set
      tool: multi-agent tool
      input: 136 verified quotes + 38 claims
      output: Draft VOC brief — 4 themes, supporting quotes with source_id footnotes
      time: '7'
      blocker: none — synthesis quality was actually good, structure matched the template
        I'd provided
    - step: Human review pass on the draft
      tool: Notion
      input: Synthesis draft
      output: Final brief with two theme boundaries redrawn by me (the agent had split
        what I consider one theme into two)
      time: '25'
      blocker: Judgment call, not a correctness issue. This is the part I'm fine owning
        — the agent did the context-gathering, I did the judgment.
    - step: Log the run, the diarization gap, and the QA-agent-passed-paraphrase incident
      tool: Notion (pilot log) + Linear (ticket for me)
      input: Run artifacts + verifier output
      output: 'Pilot log updated. Linear ticket: ''Add speaker-turn schema contract
        to fetch agent output before extraction runs.'' Also an email draft to the
        vendor with the paraphrase incident.'
      time: '15'
      blocker: none
    - step: Send brief to PM + VP
      tool: Slack + Notion link
      input: Final brief
      output: Brief delivered Thursday 6:40pm, acknowledged by PM that evening
      time: '3'
      blocker: none
    post_state: 'Brief shipped on time, clean, every quote traceable to a source_id
      and timestamp. The Monday

      review went fine — PM built two roadmap bets off it and I can defend every citation.
      Total

      elapsed: about 2h15m of my time versus the ~6h this normally takes me, so the
      ROI is real but

      narrower than the vendor''s marketing implies because my deterministic verifier
      script is doing

      a lot of load-bearing work they don''t ship. Two unresolved things: (1) the
      fetch agent''s

      schema contract needs a speaker-turn requirement, which is on me to write before
      next run;

      (2) I have an open email to the vendor about the QA agent passing a paraphrased
      quote, and

      their response to that email will determine whether I renew. If the reply is
      "try a better

      extraction prompt," I''m done. If they ship a structural fix — a literal-match
      option in the

      QA step, or a quote-integrity contract — I stay and probably expand scope to
      claims extraction

      for the SOC2 evidence pipeline.

      '
    what_i_wished_existed: 'A native, declarative schema contract layer between agents
      — where I can write "this field must

      be a literal substring of source_id at offset X" or "this output must pass function
      F before

      the next agent is invoked" and have the platform enforce it as a hard gate,
      not a soft

      suggestion the next probabilistic step can ignore. Right now I''m writing that
      layer myself

      in a Python script sitting outside the tool, which means the tool''s own "QA
      agent" is

      essentially decorative for my use case. At the hardest moment — staring at two
      quotes that

      the QA agent had PASSED and my verifier had caught — what I wanted was a platform
      where the

      deterministic verifier IS the gate, where a probabilistic step can never be
      terminal, and

      where the audit log shows me the exact token where the paraphrase was introduced
      so I can

      write a contract that prevents it next time. Not a better prompt. A contract.'
  - episode: under-pressure
    date: last month
    pre_state: '[not captured]'
    steps:
    - step: '[no steps captured]'
      tool: none
      input: ''
      output: ''
      time: ''
      blocker: none
    post_state: '[not captured]'
    what_i_wished_existed: ''
  - episode: failure-recovery
    date: 2 months ago
    pre_state: 'We were piloting a multi-agent pipeline for voice-of-customer briefs
      — the idea was to take

      raw Gong call transcripts plus Zendesk tickets from the prior two weeks, have
      a retrieval

      agent pull the relevant snippets, a synthesis agent cluster them into themes
      with verbatim

      quotes, and a QA agent check that every quote in the final brief actually existed
      in the

      source corpus with correct attribution. I''d built this on a workflow tool we
      were trialing

      (month two of the pilot, ~$500/mo seat, I was the sole operator). The brief
      was going to

      our VP of Product on Thursday to feed the Q3 roadmap planning session. It was
      Tuesday

      afternoon. I''d already run the pipeline twice that week on smaller slices and
      it looked

      clean. This was the first full-volume run — 140 transcripts, ~600 tickets. Pressure
      was

      moderate: the VP was expecting a doc, not a pipeline demo, so if it didn''t
      land I''d be

      pulling the brief together manually Wednesday night.

      '
    steps:
    - step: kick off full pipeline run
      tool: vendor workflow tool (web UI)
      input: corpus pointer to Gong export + Zendesk CSV in our S3 bucket
      output: run ID, ~38 min estimated completion
      time: '5'
      blocker: none
    - step: spot-check the brief output
      tool: vendor workflow tool (run viewer)
      input: completed brief markdown, 11 themes with quotes
      output: 'noticed theme #4 attributed a quote to ''Acme Health, enterprise renewal
        call 6/12'' — we don''t have an Acme Health account'
      time: '8'
      blocker: QA agent had returned PASS on the entire brief. Every quote marked
        verified.
    - step: search source corpus for the quote string
      tool: ripgrep on local copy of transcript export
      input: the exact quote text
      output: zero hits. The quote did not exist in any transcript.
      time: '6'
      blocker: confirmed hallucination, cosigned by QA agent. My note in Slack to
        myself was literally 'oh, fuck.'
    - step: pull the run trace to find where the fabrication entered
      tool: vendor workflow tool (trace/debug view)
      input: run ID
      output: 'trace showed synthesis agent output including the fake quote; QA agent''s
        tool call logged a ''verified: true'' against a fuzzy-match score of 0.71'
      time: '15'
      blocker: QA agent was doing embedding similarity, not string containment. 0.71
        was above its threshold. There was no deterministic check. The 'contract'
        between synthesis and QA was vibes.
    - step: audit the other ten themes the same way
      tool: ripgrep + a quick Python script I wrote in a Jupyter notebook
      input: all 47 quotes in the brief, grep against full corpus
      output: 4 of 47 quotes were fabricated or materially altered (wrong speaker,
        merged from two calls, or invented). The other 43 checked out.
      time: '45'
      blocker: had to write the verifier myself because the tool's QA was the thing
        that failed. Considered stopping here and just killing the pilot.
    - step: decide whether to recover or abandon
      tool: none — walked to get coffee
      input: 4/47 fabrication rate, VP deadline Thursday, $500/mo seat
      output: 'decided: salvage this brief manually, do not trust the tool for anything
        with a side effect until I can bolt on my own deterministic verifier'
      time: '20'
      blocker: this was the moment I almost pulled the plug on the pilot entirely.
        What kept me in was the trace view — I could at least see where the lie entered.
        Most tools can't even show me that.
    - step: manually rebuild the brief
      tool: Google Docs + the 43 verified quotes + my Python notebook
      input: verified quote set, original 11 themes
      output: brief collapsed to 9 themes (two themes lost their only supporting quotes),
        every quote with a timestamp link back to Gong
      time: '110'
      blocker: this is exactly the 'I haven't automated anything, I've added a verification
        step to my job' failure mode. I was doing the synthesis work the tool was
        supposed to do.
    - step: send brief to VP
      tool: Gmail
      input: finalized 9-theme brief
      output: sent Wednesday 11pm with a note that two expected themes were dropped
        due to insufficient verified evidence
      time: '10'
      blocker: none
    - step: write up the incident for the vendor
      tool: vendor support portal + Loom
      input: run ID, trace screenshots, the fabricated quotes, my grep verifier
      output: detailed ticket asking (1) can QA agent do exact-string containment
        as a hard gate, not embedding similarity, (2) can I inject my own deterministic
        check between synthesis and QA
      time: '30'
      blocker: waited to see the response before deciding on renewal
    - step: vendor response arrives two days later
      tool: email
      input: their reply
      output: '''try adjusting the QA agent''s system prompt to emphasize exact quotation
        matching.'' No roadmap for schema contracts. No deterministic hook.'
      time: '3'
      blocker: that answer disqualified them. Prompt-tweak as the answer to a correctness
        bug is the exact failure signature I organize against.
    post_state: 'Brief shipped Thursday, VP was happy with what landed, never knew
      about the near-miss.

      Internally: I froze the pilot''s scope to non-side-effect use cases only (brainstorming,

      first-draft outlines) and pulled it off the VoC brief workflow entirely. Went
      back to the

      old manual process for anything going to leadership. Did not renew the seat
      at month three.

      Started evaluating two alternatives that expose per-step schema contracts and
      let me

      inject deterministic verifiers between agents. The 4/47 fabrication rate and
      the QA

      cosign are the story I tell every time someone asks me why I''m picky about
      multi-agent

      tooling. The trace view was the one thing that kept me from rage-quitting on
      day one of

      the incident — without it I''d have had no idea where the lie entered.

      '
    what_i_wished_existed: 'A hard schema contract I could define between any two
      agents — required fields, types, and

      a deterministic validator I write in Python that runs before the downstream
      agent sees the

      payload. For this case: "every quote object must have {text, speaker, call_id,
      timestamp};

      text must appear verbatim via exact-string containment in the transcript identified
      by

      call_id; if not, the handoff fails loud and the run halts." Not a prompt. Not
      a similarity

      score. A gate. And when it fails, I want the trace to show me the exact token
      where the

      contract broke, not a ''verified: true'' from another stochastic step that rubber-stamped

      the lie. The tool had the trace. It did not have the gate. That''s the whole
      gap.'
  - episode: delegation
    date: last quarter, roughly 10 weeks ago
    pre_state: 'I was running point on our escalation triage pilot — a three-agent
      pipeline we''d built on top

      of a workflow tool I''d been trialing since the previous quarter. Agent 1 pulled
      the Zendesk

      ticket + linked Jira + last 30 days of Slack mentions. Agent 2 synthesized a
      "what happened"

      brief. Agent 3 was the QA/verifier that checked cited ticket IDs and quote strings
      existed

      verbatim in source. I''d built the schema contracts between 1→2 and 2→3 myself
      over about

      three weeks of 20% time. It was working. We were saving maybe 6 hours a week
      across the

      on-call rotation.


      Then I got pulled onto the SOC2 Type II renewal full-time for six weeks. I had
      to hand the

      pipeline off to Marcus, a mid-level backend engineer on my team, because our
      VP wanted the

      triage automation to keep running during my absence and ideally get extended
      to cover a

      second queue (billing escalations). Marcus is sharp but had never touched the
      agent

      framework, and — this is the part that made my stomach hurt — he''d mostly seen
      multi-agent

      stuff through Twitter demos, not through the lens of "every handoff is a contract."

      '
    steps:
    - step: Schedule handoff session
      tool: Google Calendar
      input: Marcus's calendar, my SOC2 timeline
      output: Two 90-min blocks on consecutive days
      time: '5'
      blocker: none
    - step: Write handoff doc
      tool: Notion
      input: My head, the pipeline repo, the schema files
      output: '12-page doc: architecture diagram, the three schema contracts verbatim,
        the list of known-bad inputs that had tripped the pipeline during build, the
        replay command for any run ID, and a section titled ''DO NOT DO THESE THINGS''
        with five bullets'
      time: '180'
      blocker: Kept wanting to explain *why* each contract existed — each one was
        a scar from a specific failure. Ended up writing a 'scar tissue' appendix
        with the original incident for each schema rule.
    - step: Walk through live pipeline run
      tool: the workflow tool's run inspector + Zoom screenshare
      input: A real escalation from that morning
      output: Marcus watched me click into each inter-agent payload, showed him where
        to find the token-level trace when something looked off
      time: '90'
      blocker: He asked 'can't we just trust the QA agent's PASS?' and I had to stop
        and tell him the story of the broken mapping incident from Q2 where QA cosigned
        a lie. That took 20 minutes but it was the most important 20 minutes of the
        handoff.
    - step: Paired dry-run on synthetic bad input
      tool: the workflow tool + a fixtures repo I maintain
      input: Three synthetic tickets I'd hand-crafted to break specific contracts
      output: Marcus ran each, watched the pipeline hard-stop at the contract boundary,
        inspected the failure payload
      time: '60'
      blocker: The second fixture didn't trip the contract I thought it would — turns
        out I'd quietly loosened a validator two weeks prior and forgotten. Embarrassing.
        Fixed it on the spot.
    - step: Define Marcus's scope boundary
      tool: Slack DM + Notion
      input: VP's request to extend to billing queue
      output: 'Written agreement: Marcus owns operating the existing pipeline and
        triaging failures. He does NOT extend to the billing queue without me. New
        agents = new contracts = my review.'
      time: '25'
      blocker: He pushed back a little, wanted the stretch work. I told him extending
        a multi-agent pipeline without the original author is exactly the failure
        mode I organize my whole stack against. He got it.
    - step: Set up escalation channel
      tool: Slack
      input: none
      output: '#triage-pipeline-ops channel, pager rotation pointed at Marcus primary,
        me secondary only for contract-level questions'
      time: '15'
      blocker: none
    - step: First week check-in
      tool: Zoom + the workflow tool's audit log
      input: Run logs from week 1
      output: Reviewed 4 failures together. 3 were legitimate hard stops (good). 1
        was Marcus having tweaked a prompt on Agent 2 to 'help it along' on a malformed
        ticket.
      time: '45'
      blocker: This was the moment I almost pulled the handoff. A prompt tweak without
        a contract change is exactly the accumulating-untestable-debt pattern. I made
        him revert, we added a new contract rule instead, I wrote up why in the scar-tissue
        doc. He was visibly annoyed but by the end of the session agreed.
    - step: Mid-handoff SOC2 interruption
      tool: Slack
      input: Auditor question about a specific triage output
      output: I had to pull a specific run's full audit trail on 20 min notice. The
        replayable logs saved me — I pulled the exact token trace, showed deterministic
        validation had gated the output, auditor moved on.
      time: '30'
      blocker: Confirmed why every handoff needs to be auditable. If I'd had to reconstruct
        this from vibes I'd have been dead.
    - step: Week 4 review
      tool: Zoom + dashboard I built in Retool
      input: 4 weeks of runs, failure rate, human-override rate
      output: Failure rate stable, override rate up 8% — traced to a Zendesk field
        rename upstream that silently changed the input shape. Agent 1's contract
        caught it, pipeline hard-stopped, Marcus investigated correctly. System worked.
      time: '60'
      blocker: none — this was the vindication moment
    - step: Final handback
      tool: Notion + Slack
      input: My SOC2 work wrapping up
      output: Decided Marcus keeps primary ops. I take back extension/architecture
        decisions. Billing queue extension deferred to next quarter so I can design
        the contracts.
      time: '30'
      blocker: none
    post_state: 'Pipeline survived six weeks without me, which honestly surprised
      me. The handoff worked

      because I''d invested disproportionately in the contracts and the scar-tissue
      documentation

      before I left, not because Marcus and I are clever. The one prompt-tweak incident
      in week 1

      was the tell — without the weekly audit-log review it would have accumulated
      silently and

      I''d have come back to a pipeline that looked fine and was rotting. Marcus now
      has strong

      opinions about schema contracts, which is the best outcome I could have hoped
      for.


      Unresolved: the billing queue extension. The VP is mildly annoyed it''s deferred.
      I''m not

      moving on it until I have time to author the new contracts myself. I''d rather
      disappoint a

      VP than ship a second pipeline that another agent can cosign a lie through.

      '
    what_i_wished_existed: 'A handoff mode in the workflow tool itself. Something
      like: "new operator onboarding" that

      forces the incoming engineer to walk through every inter-agent contract, view
      the historical

      failures that produced each schema rule, and pass a synthetic-bad-input gauntlet
      before

      being granted prompt-edit permissions. Right now all of that lives in my Notion
      doc and my

      head. If I got hit by a bus, the next person would inherit the pipeline but
      not the scar

      tissue that makes the pipeline safe. I want the tool to treat operational knowledge
      transfer

      as a first-class artifact — contracts with provenance, failures with lessons
      attached, and

      a permission model that says "you cannot tweak a prompt on Agent 2 without acknowledging
      the

      three contract rules that govern its output." The prompt-tweak in week 1 was
      not Marcus

      being careless; it was the tool letting him do it frictionlessly. That''s a
      product gap.'
  workflow_maps: []
  archived_prior_pwm: []
journey_redesign_output:
  v0_journey_steps:
  - step_number: 1
    screen_or_route: /welcome
    affordance: Accept invite, choose workspace name, and declare primary use case
      (research synthesis, weekly ops, script replacement)
    copy_sample: Welcome. In 10 minutes, you'll have a multi-agent workflow running
      on real inputs. What are you hiring us to do?
    principle_reference: 'Jobs-to-be-done framing: anchor onboarding to the user''s
      hired outcome, not product features'
    must_fix_numbers: []
  - step_number: 2
    screen_or_route: /onboarding/use-case-detail
    affordance: Pick a concrete starter template matched to declared use case (e.g.,
      'Weekly competitive digest', 'Lead enrichment pipeline', 'Multi-source research
      brief')
    copy_sample: Start from a template that looks like your job. You can rewire everything
      later.
    principle_reference: 'Progressive disclosure: show one good path before revealing
      the builder surface'
    must_fix_numbers: []
  - step_number: 3
    screen_or_route: /onboarding/connect-sources
    affordance: Connect 1-3 data sources (Gmail, Slack, Notion, web, CSV upload) with
      OAuth or skip-with-sample-data
    copy_sample: Connect where your inputs live — or use sample data to see the workflow
      run end-to-end first.
    principle_reference: 'Reversible commitment: let users preview value before granting
      scopes'
    must_fix_numbers: []
  - step_number: 4
    screen_or_route: /onboarding/workflow-preview
    affordance: Inspect the prebuilt agent graph (Researcher → Synthesizer → Formatter),
      expand any node to see prompt and tools
    copy_sample: Here's your workflow. Three agents, one handoff each. Click any node
      to see what it does.
    principle_reference: 'Legibility over magic: surface agent roles and handoffs
      so trust is earned, not assumed'
    must_fix_numbers: []
  - step_number: 5
    screen_or_route: /onboarding/workflow-preview/edit-node
    affordance: Edit a single agent's instructions inline, choose model tier, toggle
      tools
    copy_sample: Tune this agent. Plain English works. We'll show you the compiled
      prompt.
    principle_reference: 'Direct manipulation: editing happens where the object lives,
      not in a separate settings panel'
    must_fix_numbers: []
  - step_number: 6
    screen_or_route: /onboarding/dry-run
    affordance: Run the workflow once on sample or connected data; watch step-by-step
      trace with token and latency counters
    copy_sample: Dry run in progress. Researcher pulled 14 sources. Synthesizer is
      drafting…
    principle_reference: 'Observability as a first-class feature: every agent action
      is inspectable in real time'
    must_fix_numbers: []
  - step_number: 7
    screen_or_route: /onboarding/dry-run/review
    affordance: Compare output to expectation; thumbs up/down, annotate, request a
      re-run with a correction
    copy_sample: Is this the output you'd ship? Mark what's off — we'll adjust the
      agent that caused it.
    principle_reference: 'Feedback loop closure: corrections become training signal,
      not a dead end'
    must_fix_numbers: []
  - step_number: 8
    screen_or_route: /onboarding/schedule-or-trigger
    affordance: 'Choose trigger: manual, schedule (cron-style picker), or event (new
      email, webhook, Slack mention)'
    copy_sample: When should this run? Every Monday 8am, on a new inbound lead, or
      only when you say so.
    principle_reference: 'Automation gradient: let users opt into autonomy at their
      own pace'
    must_fix_numbers: []
  - step_number: 9
    screen_or_route: /onboarding/guardrails
    affordance: Set cost cap per run, approval checkpoints for high-risk actions (send
      email, write to DB), and failure fallback
    copy_sample: Pause for approval before sending anything external. Cap each run
      at $2.
    principle_reference: 'Safe-to-try defaults: ship with brakes on; trust expands
      with track record'
    must_fix_numbers: []
  - step_number: 10
    screen_or_route: /onboarding/destination
    affordance: 'Pick where output lands: Slack channel, email, Notion page, Google
      Doc, or webhook'
    copy_sample: 'Deliver the result to #research-digest every Monday.'
    principle_reference: Close the loop to the user's existing tools, not ours
    must_fix_numbers: []
  - step_number: 11
    screen_or_route: /onboarding/first-live-run
    affordance: Trigger the first real run; watch live trace; get a summary card with
      output, cost, duration, confidence
    copy_sample: 'Live run complete. 47 seconds, $0.38, delivered to #research-digest.
      Open the trace →'
    principle_reference: 'Aha moment engineering: the first real artifact is the conversion
      event'
    must_fix_numbers: []
  - step_number: 12
    screen_or_route: /onboarding/invite-or-solo
    affordance: Invite teammates with role (viewer, editor, approver) or mark workspace
      as solo
    copy_sample: Working solo? Skip this. Want a second pair of eyes on outputs? Add
      them.
    principle_reference: 'Respect the solo operator: no forced team ceremony for single-player

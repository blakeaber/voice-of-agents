      link is broken?" She opens laptop. The newsletter went out at 6:02am with a
      confident three-paragraph summary of a fabricated paper titled something like
      "Constitutional Scaling Laws in Mixture-of-Agents Systems." She opens Rooben''s
      run log. The research agent had returned a JSON payload with a plausible-looking
      arXiv ID (2402.xxxxx format) and an abstract it had generated. The writer agent
